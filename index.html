<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
}

button{
  background:#dff5df;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:8px;
  background:white;
  border-radius:6px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }
.day.today{ background:#e6f7ff; } /* 今日 */
.sunday{ border:2px solid #ff8a8a; }

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}

.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
  border:2px solid transparent;
  cursor:pointer;
}

.tag.selected{
  background:#eaf6fb;
  border:2px solid #9ed0e6;
}

.tag button{
  margin-left:5px;
  font-size:10px;
}

.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}

.edit-btn{ position:absolute; right:40px; top:6px; }
.delete-btn{ position:absolute; right:8px; top:6px; }

.meta{ font-size:12px; color:#888; }

.small{ font-size:12px; color:#666; }
</style>
</head>

<body>

<h2>カルテノート</h2>

<button id="backupBtn">📦 バックアップ</button><br>
<input type="file" id="fileInput"><br>
<button id="restoreBtn">復元</button>

<!-- ⭐ここに日時 -->
<div id="backupInfo" class="small"></div>

<hr>

<!-- ⭐ナビ -->
<div class="nav">
<button id="prevYear">⏪</button>
<button id="prevMonth">◀</button>
<div id="monthLabel"></div>
<button id="nextMonth">▶</button>
<button id="nextYear">⏩</button>
</div>

<div id="calendar" class="calendar"></div>

<hr>

<input id="tagInput">
<button id="addTagBtn">追加</button>

<div id="tagList"></div>

<textarea id="text"></textarea>
<button id="sendBtn">送信</button>

<div>
<button id="allBtn">すべて</button>
<button id="favBtn">♡のみ</button>
</div>

<div class="small">タグ検索🔍</div>
<div id="tagFilterArea"></div>

<div id="list"></div>

<script>
try{

const el=id=>document.getElementById(id);

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let current=new Date();
let selectedDate=formatDate(current);
let activeTagFilter=null;

/* 日付 */
function formatDate(d){
  return d.toISOString().slice(0,10);
}

/* カレンダー */
function draw(){
  const cal=el('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();

  el('monthLabel').innerText=y+"年 "+(m+1)+"月";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const today=formatDate(new Date());

  for(let i=0;i<first;i++) cal.appendChild(document.createElement('div'));

  for(let i=1;i<=last;i++){
    const d=formatDate(new Date(y,m,i));
    const div=document.createElement('div');

    div.className='day';
    if(d===selectedDate) div.classList.add('active');
    if(d===today) div.classList.add('today');

    if((first+(i-1))%7===0) div.classList.add('sunday');

    div.innerText=i;
    div.onclick=()=>{selectedDate=d;draw();render();};

    cal.appendChild(div);
  }
}

/* ナビ */
el('prevMonth').onclick=()=>{current.setMonth(current.getMonth()-1);draw();};
el('nextMonth').onclick=()=>{current.setMonth(current.getMonth()+1);draw();};
el('prevYear').onclick=()=>{current.setFullYear(current.getFullYear()-1);draw();};
el('nextYear').onclick=()=>{current.setFullYear(current.getFullYear()+1);draw();};

/* タグ */
el('addTagBtn').onclick=()=>{
  const v=el('tagInput').value;
  if(!v)return;
  tags.push(v);
  el('tagInput').value='';
  save();
};

function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag'+(selectedTags.includes(t)?' selected':'');

    span.innerText=t;

    span.onclick=()=>{
      selectedTags.includes(t)
      ? selectedTags=selectedTags.filter(x=>x!==t)
      : selectedTags.push(t);
      renderTags();
    };

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=(e)=>{
      e.stopPropagation();
      const n=prompt("変更",t);
      if(!n)return;
      tags=tags.map(x=>x===t?n:x);
      entries.forEach(e=>e.tags=e.tags?.map(x=>x===t?n:x));
      save();
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=(e)=>{
      e.stopPropagation();
      if(!confirm("削除する？"))return;
      tags=tags.filter(x=>x!==t);
      entries.forEach(e=>e.tags=e.tags?.filter(x=>x!==t));
      save();
    };

    span.append(edit,del);
    area.appendChild(span);
  });
}

/* タグ検索 */
function renderTagFilter(){
  const area=el('tagFilterArea');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag'+(activeTagFilter===t?' selected':'');

    span.innerText=t;

    span.onclick=()=>{
      activeTagFilter=activeTagFilter===t?null:t;
      renderTagFilter();
      render();
    };

    area.appendChild(span);
  });
}

/* 投稿 */
el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    id:Date.now(),
    text:txt,
    date:selectedDate,
    tags:[...selectedTags],
    createdAt:Date.now()
  });

  el('text').value='';
  selectedTags=[];
  save();
};

/* ⭐タグ付き編集 */
function editEntry(e){
  const txt=prompt("修正",e.text);
  if(txt===null)return;

  selectedTags=[...(e.tags||[])];
  renderTags();

  el('text').value=txt;

  entries=entries.filter(x=>x.id!==e.id);
}

/* 表示 */
function render(){
  const list=el('list');
  list.innerHTML='';

  let arr=entries.filter(e=>e.date===selectedDate);
  if(activeTagFilter) arr=arr.filter(e=>e.tags?.includes(activeTagFilter));

  arr.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry';

    const meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=new Date(e.createdAt).toLocaleString();

    const text=document.createElement('div');
    text.innerText=e.text;

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.className='edit-btn';
    edit.onclick=()=>editEntry(e);

    const del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=()=>{
      if(confirm("削除する？")){
        entries=entries.filter(x=>x.id!==e.id);
        save();
      }
    };

    div.append(meta,text,edit,del);

    if(e.tags){
      const tagDiv=document.createElement('div');
      e.tags.forEach(t=>{
        const span=document.createElement('span');
        span.className='tag';
        span.innerText=t;
        tagDiv.appendChild(span);
      });
      div.appendChild(tagDiv);
    }

    list.appendChild(div);
  });
}

/* 保存 */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
  renderTagFilter();
}

/* バックアップ */
el('backupBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({entries,tags})]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup.json';
  a.click();

  localStorage.setItem('backupDate',Date.now());
  updateBackupInfo();
};

el('restoreBtn').onclick=()=>{
  const file=el('fileInput').files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=e=>{
    const d=JSON.parse(e.target.result);
    entries=d.entries||[];
    tags=d.tags||[];
    save();

    localStorage.setItem('backupDate',Date.now());
    updateBackupInfo();
  };
  reader.readAsText(file);
};

function updateBackupInfo(){
  const last=localStorage.getItem('backupDate');
  el('backupInfo').innerText=
    last ? "📦 最終："+new Date(Number(last)).toLocaleString('ja-JP')
         : "📦 未バックアップ";
}

/* 初期 */
draw();
render();
renderTags();
renderTagFilter();
updateBackupInfo();

}catch(e){
  document.body.innerHTML="<pre>"+e+"</pre>";
}
</script>

</body>
</html>
