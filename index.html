<!-- 変更はscript内が中心なのでHTMLはそのまま使える -->

<script>
let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let currentType='symptom';
let current=new Date();
let selectedDate=formatDate(current);
let currentFilter='all';

/* フィルター */
function setFilter(type){
  currentFilter=type;

  document.getElementById('filterAll').classList.remove('active-filter');
  document.getElementById('filterFav').classList.remove('active-filter');

  if(type==='all'){
    document.getElementById('filterAll').classList.add('active-filter');
  }else{
    document.getElementById('filterFav').classList.add('active-filter');
  }

  render();
}

/* タイプ */
function setType(type,el){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

/* 日付 */
function formatDate(d){return d.toISOString().slice(0,10);}
function formatDateTime(ts){
  return new Date(ts).toLocaleString('ja-JP',{
    month:'numeric',
    day:'numeric',
    hour:'2-digit',
    minute:'2-digit'
  });
}

/* 月 */
function changeMonth(diff){
  current.setMonth(current.getMonth()+diff);
  drawCalendar();
}

/* カレンダー */
function drawCalendar(){
  document.getElementById('monthLabel').innerText=
    current.getFullYear()+"年 "+(current.getMonth()+1)+"月";

  const cal=document.getElementById('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();
  const last=new Date(y,m+1,0).getDate();

  for(let i=1;i<=last;i++){
    const d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');

    const div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.innerText=i;

    div.onclick=()=>{
      selectedDate=d;
      render();
      drawCalendar();
    };

    cal.appendChild(div);
  }
}

/* タグ */
function addTag(){
  const val=document.getElementById('tagInput').value;
  if(!val)return;
  tags.push(val);
  document.getElementById('tagInput').value='';
  saveAll();
}

function renderTags(){
  const el=document.getElementById('tagList');
  el.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag';

    if(selectedTags.includes(t)){
      span.classList.add('selected');
    }

    const text=document.createElement('span');
    text.innerText=t;
    text.onclick=()=>{
      if(selectedTags.includes(t)){
        selectedTags=selectedTags.filter(x=>x!==t);
      }else{
        selectedTags.push(t);
      }
      renderTags();
    };

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=(e)=>{e.stopPropagation();renameTag(t);};

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=(e)=>{e.stopPropagation();deleteTag(t);};

    span.append(text,edit,del);
    el.appendChild(span);
  });
}

function renameTag(tag){
  const newName=prompt("タグ名変更",tag);
  if(!newName)return;

  tags = tags.map(t=>t===tag?newName:t);

  entries.forEach(e=>{
    if(e.tags){
      e.tags = e.tags.map(t=>t===tag?newName:t);
    }
  });

  saveAll();
}

function deleteTag(tag){
  if(!confirm("このタグ削除しても大丈夫？")) return;

  tags = tags.filter(t=>t!==tag);

  entries.forEach(e=>{
    if(e.tags){
      e.tags = e.tags.filter(t=>t!==tag);
    }
  });

  saveAll();
}

/* 投稿 */
function add(){
  const text=document.getElementById('text').value;
  if(!text)return;

  entries.unshift({
    id:Date.now(),
    text,
    date:selectedDate,
    type:currentType,
    fav:false,
    tags:[...selectedTags],
    createdAt:Date.now() // ⭐追加
  });

  document.getElementById('text').value='';
  selectedTags=[];
  saveAll();
}

/* 編集 */
function editEntry(id){
  const item=entries.find(e=>e.id===id);
  const newText=prompt("内容を修正",item.text);
  if(newText!==null){
    item.text=newText;
    saveAll();
  }
}

/* 削除 */
function deleteEntry(id){
  if(!confirm("この記録を削除しても大丈夫？")) return;
  entries=entries.filter(e=>e.id!==id);
  saveAll();
}

/* 表示 */
function render(){
  const list=document.getElementById('list');
  list.innerHTML='';

  let filtered=entries.filter(e=>e.date===selectedDate);

  if(currentFilter==='fav'){
    filtered=filtered.filter(e=>e.fav);
  }

  filtered.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry '+e.type;

    // ❤️
    const heart=document.createElement('span');
    heart.className='heart '+(e.fav?'on':'off');
    heart.innerText=e.fav?'🩵':'♡';
    heart.onclick=()=>{e.fav=!e.fav;saveAll();};

    // 🕒日時
    const meta=document.createElement('div');
    meta.style.fontSize="12px";
    meta.style.color="#888";
    meta.innerText="🕒 "+formatDateTime(e.createdAt||e.id);

    // 本文
    const text=document.createElement('div');
    text.innerText=e.text;

    // ✏️
    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=()=>editEntry(e.id);

    // 🗑
    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=()=>deleteEntry(e.id);

    div.append(heart,meta,text,edit,del);

    // タグ
    if(e.tags){
      const tagDiv=document.createElement('div');
      e.tags.forEach(t=>{
        const span=document.createElement('span');
        span.className='tag';
        span.innerText=t;
        tagDiv.appendChild(span);
      });
      div.appendChild(tagDiv);
    }

    list.appendChild(div);
  });
}

/* 保存 */
function saveAll(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

/* バックアップ */
function exportData(){
  const blob=new Blob([JSON.stringify({entries,tags})]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();

  localStorage.setItem('backupDate',Date.now());
  updateBackupInfo();
}

function importData(){
  const file=document.getElementById('importFile').files[0];
  if(!file)return alert("ファイル選択してね");

  const reader=new FileReader();
  reader.onload=e=>{
    const data=JSON.parse(e.target.result);
    entries=data.entries||[];
    tags=data.tags||[];
    saveAll();

    localStorage.setItem('backupDate',Date.now());
    updateBackupInfo();
  };
  reader.readAsText(file);
}

function showFileName(){
  const file=document.getElementById('importFile').files[0];
  document.getElementById('fileName').innerText=file?file.name:'';
}

function updateBackupInfo(){
  const last=localStorage.getItem('backupDate');
  if(!last){
    document.getElementById('backupInfo').innerText="📦 未バックアップ";
    return;
  }
  document.getElementById('backupInfo').innerText="📦 最終："+new Date(Number(last)).toLocaleString('ja-JP');
}

window.onload=function(){
  drawCalendar();
  render();
  renderTags();
  updateBackupInfo();
  setFilter('all');
};
</script>
