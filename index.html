<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f5f0e8;
  padding:20px;
}

h1{margin-bottom:10px}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-bottom:15px;
}

.day{
  padding:10px;
  background:white;
  text-align:center;
  cursor:pointer;
  border:1px solid #ddd;
  border-radius:8px;
}

.day.active{
  background:#c2543a;
  color:white;
}

.controls{
  margin-bottom:10px;
}

.type-btn{
  background:white;
  border:2px solid #ccc;
  padding:6px 10px;
  border-radius:8px;
  margin-right:5px;
}

.type-btn.active{
  font-weight:bold;
}

.type-btn.active.symptom{
  border-color:#4a90e2;
  color:#4a90e2;
}

.type-btn.active.memo{
  border-color:#4caf50;
  color:#4caf50;
}

textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:10px;
}

button{
  margin-top:8px;
  padding:6px 12px;
  border:none;
  border-radius:8px;
  background:#333;
  color:white;
  cursor:pointer;
}

.entry{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-left:6px solid #c2543a;
  border-radius:8px;
}

.entry.memo{
  border-color:#4caf50;
}

.star{
  cursor:pointer;
  font-size:18px;
  margin-right:6px;
}
</style>
</head>

<body>

<h1>カルテノート</h1>

<div class="header">
  <button onclick="prevMonth()">◀</button>
  <div id="monthLabel"></div>
  <button onclick="nextMonth()">▶</button>
</div>

<div class="controls">
  <button onclick="toggleStarFilter()">⭐のみ表示</button>
</div>

<div id="calendar" class="calendar"></div>

<div>
  <button class="type-btn active symptom" onclick="setType('symptom', this)">🩺 症状</button>
  <button class="type-btn memo" onclick="setType('memo', this)">💊 薬</button>
</div>

<textarea id="text" placeholder="体調を書いてください（Enterで記録 / Shift+Enterで改行）"></textarea>

<label>
  <input type="checkbox" id="starInput"> ⭐重要
</label>
<br>

<button onclick="add()">記録（Enter）</button>

<div id="list"></div>

<script>
let entries = JSON.parse(localStorage.getItem('data')||'[]');

let current = new Date();
let selectedDate = formatDate(current);
let starOnly = false;
let currentType = 'symptom';

function formatDate(d){
  return d.toISOString().slice(0,10);
}

function drawCalendar(){
  const cal=document.getElementById('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();

  document.getElementById('monthLabel').textContent = `${y}年 ${m+1}月`;

  const last=new Date(y,m+1,0).getDate();

  for(let i=1;i<=last;i++){
    const d=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    const div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.textContent=i;

    div.onclick=()=>{
      selectedDate=d;
      render();
      drawCalendar();
    };

    cal.appendChild(div);
  }
}

function prevMonth(){
  current.setMonth(current.getMonth()-1);
  drawCalendar();
}

function nextMonth(){
  current.setMonth(current.getMonth()+1);
  drawCalendar();
}

function setType(type, el){
  currentType = type;

  document.querySelectorAll('.type-btn').forEach(b=>{
    b.classList.remove('active');
  });

  el.classList.add('active');
}

function add(){
  const text=document.getElementById('text').value;
  if(!text)return;

  const star = document.getElementById('starInput').checked;

  entries.unshift({
    text,
    date:selectedDate,
    star:star,
    type:currentType
  });

  localStorage.setItem('data',JSON.stringify(entries));

  document.getElementById('text').value='';
  document.getElementById('starInput').checked=false;

  render();
}

function toggleStar(i){
  entries[i].star=!entries[i].star;
  localStorage.setItem('data',JSON.stringify(entries));
  render();
}

function toggleStarFilter(){
  starOnly=!starOnly;
  render();
}

function render(){
  const list=document.getElementById('list');

  let filtered = entries.filter(e=>e.date===selectedDate);

  if(starOnly){
    filtered = filtered.filter(e=>e.star);
  }

  if(filtered.length===0){
    list.innerHTML='記録なし';
    return;
  }

  list.innerHTML=filtered.map((e,i)=>`
    <div class="entry ${e.type}">
      <span class="star" onclick="toggleStar(${i})">
        ${e.star?'⭐':'☆'}
      </span>
      ${e.text}
    </div>
  `).join('');
}

document.getElementById('text').addEventListener('keydown', function(e){
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    add();
  }
});

drawCalendar();
render();
</script>

</body>
</html>
