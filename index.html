<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>カルテノート</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6fbf73">

<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon.png">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  padding-bottom:80px;
}

h2{ color:#6fbf73; }

button{
  background:#dff5df;
  border:none;
  border-radius:8px;
  padding:4px 8px;
  margin-left:4px;
}

.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}

.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
}

.meta{ font-size:12px; color:#888; }
.heart{ cursor:pointer; font-size:18px; }

textarea{
  width:100%;
  height:120px;
}
</style>
</head>

<body>

<h2>カルテノート</h2>

<button id="backupBtn">📦 バックアップ</button><br>

<div class="small">バックアップファイル選択</div>
<input type="file" id="fileInput"><br>

<button id="restoreBtn">復元</button>
<div id="backupInfo"></div>

<hr>

<div id="calendar"></div>

<hr>

<button id="symptomBtn">🩺 症状</button>
<button id="memoBtn">💊 薬</button>

<div>タグ🏷</div>
<input id="tagInput">
<button id="addTagBtn">追加</button>
<div id="tagList"></div>

<div>症状・メモ入力欄</div>

<textarea id="text"></textarea>
<button id="sendBtn">送信</button>

<div>タグ検索🔍</div>
<div id="tagFilterArea"></div>

<div id="list"></div>

<script>
const el=id=>document.getElementById(id);

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];

/* タグ追加 */
el('addTagBtn').onclick=()=>{
  const v=el('tagInput').value;
  if(!v)return;
  tags.push(v);
  el('tagInput').value='';
  save();
};

/* ⭐タグ編集削除 */
function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag';
    span.innerText=t;

    span.onclick=()=>{
      selectedTags.includes(t)
        ? selectedTags=selectedTags.filter(x=>x!==t)
        : selectedTags.push(t);
    };

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=(e)=>{
      e.stopPropagation();
      const n=prompt("変更",t);
      if(!n)return;
      tags=tags.map(x=>x===t?n:x);
      entries.forEach(e=>e.tags=e.tags?.map(x=>x===t?n:x));
      save();
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=(e)=>{
      e.stopPropagation();
      tags=tags.filter(x=>x!==t);
      entries.forEach(e=>e.tags=e.tags?.filter(x=>x!==t));
      save();
    };

    span.append(edit,del);
    area.appendChild(span);
  });
}

/* 投稿 */
el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    id:Date.now(),
    text:txt,
    tags:[...selectedTags],
    fav:false
  });

  el('text').value='';
  selectedTags=[];
  save();
};

/* ⭐投稿UI全部 */
function render(){
  const list=el('list');
  list.innerHTML='';

  entries.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry';

    /* ハート */
    const heart=document.createElement('span');
    heart.className='heart';
    heart.innerText=e.fav?'🩵':'♡';
    heart.onclick=()=>{e.fav=!e.fav;save();};

    /* テキスト */
    const text=document.createElement('div');
    text.innerText=e.text;

    /* 編集 */
    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=()=>{
      const t=prompt("修正",e.text);
      if(t!==null){ e.text=t; save(); }
    };

    /* 削除 */
    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=()=>{
      entries=entries.filter(x=>x.id!==e.id);
      save();
    };

    div.append(heart,text,edit,del);

    /* ⭐タグ */
    const tagDiv=document.createElement('div');

    (e.tags||[]).forEach(t=>{
      const span=document.createElement('span');
      span.className='tag';
      span.innerText=t;

      const delTag=document.createElement('button');
      delTag.innerText='🗑';
      delTag.onclick=()=>{
        e.tags=e.tags.filter(x=>x!==t);
        save();
      };

      tagDiv.append(span,delTag);
    });

    /* ⭐タグ追加 */
    const addBtn=document.createElement('button');
    addBtn.innerText='➕';

    addBtn.onclick=()=>{
      const t=prompt("タグ選択:\n"+tags.join(","));
      if(!t)return;
      if(!e.tags.includes(t)){
        e.tags.push(t);
        save();
      }
    };

    tagDiv.appendChild(addBtn);
    div.appendChild(tagDiv);

    list.appendChild(div);
  });
}

/* 保存 */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

/* バックアップ */
el('backupBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({entries,tags},null,2)]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup.json';
  a.click();
};

render();
renderTags();
</script>

</body>
</html>
