
<!DOCTYPE html>
<!-- update -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>カルテノート</title>

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.PNG">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.PNG">
<link rel="apple-touch-icon" href="icon-192.PNG">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
}

h2{
  color:#6fbf73;
  text-align:center;
}

button{
  background:#dff5df;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}
#sendBtn{
  display:block;
  width:80%;
  font-size:16px;
  padding:12px;
  margin-top:8px;
}
#filterRow{
  display:flex;
  gap:8px;
  margin-top:12px;
  flex-wrap:wrap;
}
/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  padding:8px;
  background:white;
  border-radius:6px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }
.day.today{ background:#e6f7ff; }
.sunday{ border:2px solid #ff8a8a; }

.nav{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
  cursor:pointer;
}
.tag.selected{
  background:#eaf6fb;
  border:2px solid #9ed0e6;
}
.tag button{
  margin-left:5px;
  font-size:10px;
}

/* 投稿 */
.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}
.entry.memo{ border-left:5px solid #9edfb5; }

.meta{ font-size:12px; color:#888; }

.heart{ cursor:pointer; font-size:18px; }
.heart.on{ color:#7ec8e3; }

.edit-btn{ position:absolute; right:40px; top:6px; }
.delete-btn{ position:absolute; right:8px; top:6px; }

.small{ font-size:12px; color:#666; }

.type-active{
  border:2px solid #8fd3c7;
  background:#e8f7f3;
}

/* ⭐タグ選択ポップ */
.tag-picker{
  background:white;
  border-radius:10px;
  padding:8px;
  margin-top:6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

textarea{
  width:100%;
  height:120px;
  font-size:14px;
}
</style>
</head>

<body>

<h2>カルテノート</h2>

<button id="backupBtn">📦 バックアップ</button><br>

<div class="small">バックアップファイル選択</div>
<input type="file" id="fileInput"><br>

<button id="restoreBtn">復元</button>
<div id="backupInfo" class="small"></div>

<hr>
<button id="toggleCal">📅 カレンダー表示/非表示</button>
<div id="calendarWrap">
     <div class="nav">
           <button id="prevYear">⏪</button>
           <button id="prevMonth">◀</button>
           <div id="monthLabel"></div>
           <button id="nextMonth">▶</button>
           <button id="nextYear">⏩</button>
</div>

<div id="calendar" class="calendar"></div>
</div>
<hr>

<button id="symptomBtn">🩺 症状</button>
<button id="memoBtn">💊 薬</button>

<div class="small">タグ🏷</div>
<input id="tagInput">
<button id="addTagBtn">追加</button>
<div id="tagList"></div>
<div class="small">症状・メモ入力欄</div>
<textarea id="text"></textarea>
<button id="sendBtn">送信</button>
<div>
<button id="allBtn">すべて</button>
<button id="favBtn">♡のみ</button>
<button id="symptomFilterBtn">🩺 症状</button>
<button id="memoFilterBtn">💊 薬</button>
</div>

<div class="small">タグ検索🔍</div>
<div id="tagFilterArea"></div>

<div id="list"></div>

<script>
try{

const el=id=>document.getElementById(id);

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let currentType='symptom';
let activeTagFilter=null;

const now = new Date();
let current = new Date(now.getFullYear(), now.getMonth(), now.getDate());
let selectedDate=formatDate(current);

/* 日付 */
function formatDate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

/* タイプ */
function updateTypeUI(){
  el('symptomBtn').classList.toggle('type-active',currentType==='symptom');
  el('memoBtn').classList.toggle('type-active',currentType==='memo');
}
el('symptomBtn').onclick=()=>{currentType='symptom';updateTypeUI();}
el('memoBtn').onclick=()=>{currentType='memo';updateTypeUI();}

let filterMode='all';
let typeFilter = null;

el('allBtn').onclick=()=>{
  filterMode='all';
  typeFilter=null;
  render();
};

el('favBtn').onclick=()=>{
  filterMode='fav';
  typeFilter=null;
  render();
};

el('symptomFilterBtn').onclick=()=>{
  filterMode='all';
  typeFilter = typeFilter==='symptom' ? null : 'symptom';
  render();
};

el('memoFilterBtn').onclick=()=>{
  filterMode='all';
  typeFilter = typeFilter==='memo' ? null : 'memo';
  render();
};

/* カレンダー */
function draw(){
  const cal=el('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();
  el('monthLabel').innerText=y+"年 "+(m+1)+"月";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();
  const today=formatDate(new Date());

  for(let i=0;i<first;i++) cal.appendChild(document.createElement('div'));

  for(let i=1;i<=last;i++){
    const d=formatDate(new Date(y,m,i));
    const div=document.createElement('div');

    div.className='day';
    if(d===selectedDate) div.classList.add('active');
    if(d===today) div.classList.add('today');
    if((first+(i-1))%7===0) div.classList.add('sunday');

    div.innerText=i;
    div.onclick=()=>{selectedDate=d;draw();render();};

    cal.appendChild(div);
  }
}

/* ナビ */
el('prevMonth').onclick=()=>{current.setMonth(current.getMonth()-1);draw();}
el('nextMonth').onclick=()=>{current.setMonth(current.getMonth()+1);draw();}
el('prevYear').onclick=()=>{current.setFullYear(current.getFullYear()-1);draw();}
el('nextYear').onclick=()=>{current.setFullYear(current.getFullYear()+1);draw()}

/* タグ */
el('addTagBtn').onclick=()=>{
  const v=el('tagInput').value;
  if(!v)return;
  tags.push(v);
  el('tagInput').value='';
  save();
};

function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach((t,i)=>{
    const wrap=document.createElement('span');
    wrap.className='tag'+(selectedTags.includes(t)?' selected':'');

    const label=document.createElement('span');
    label.innerText=t;

    /* タグ選択 */
    label.onclick=()=>{
      selectedTags.includes(t)
        ? selectedTags=selectedTags.filter(x=>x!==t)
        : selectedTags.push(t);
      renderTags();
    };

 
   /* ✏️ 編集 */const edit=document.createElement('button');
edit.innerText='✏️';
edit.className='small-btn';
edit.onclick=(e)=>{
  e.stopPropagation();
  const n=prompt("タグ変更",t);
  if(!n)return;
  tags[i]=n;

  entries.forEach(e=>{
    e.tags = (e.tags || []).map(x=>x===t?n:x);
  });

  save();
};

    /* 🗑 削除（ポップアップ付き） */
    const del=document.createElement('button');
    del.innerText='🗑';
    del.className='small-btn';
    del.onclick=(e)=>{
      e.stopPropagation();

      if(!confirm("削除する？")) return;

      tags.splice(i,1);

      /* 投稿側からも削除 */
      entries.forEach(e=>{
  e.tags = (e.tags || []).filter(x=>x!==t);
});

      save();
    };

    wrap.append(label,edit,del);
    area.appendChild(wrap);
  });
}

/* タグ検索 */
function renderTagFilter(){
  const area=el('tagFilterArea');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag'+(activeTagFilter===t?' selected':'');
    span.innerText=t;

    span.onclick=()=>{
      activeTagFilter = activeTagFilter===t ? null : t;
      renderTagFilter();
      render();
    };

    area.appendChild(span);
  });
}

/* 投稿 */
el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    id:Date.now(),
    text:txt,
    date: selectedDate,
    tags:[...selectedTags],
    type:currentType,
    fav:false,
    createdAt:Date.now()
  });

  el('text').value='';
  selectedTags=[];
  save();
};

/* 表示 */
function render(){
  const list=el('list');
  list.innerHTML='';

  let arr=entries.filter(e=>e.date===selectedDate);
if(typeFilter){
  arr = arr.filter(e=>e.type===typeFilter);
}
  if(activeTagFilter) arr=arr.filter(e=>e.tags?.includes(activeTagFilter));
if(filterMode==='fav'){
  arr=arr.filter(e=>e.fav);
}

  arr.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry '+(e.type==='memo'?'memo':'');

    const heart=document.createElement('span');
    heart.className='heart '+(e.fav?'on':'');
    heart.innerText=e.fav?'🩵':'♡';
    heart.onclick=()=>{e.fav=!e.fav;save();};

    const meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=new Date(e.createdAt).toLocaleString();

    const text=document.createElement('div');
    text.innerText=e.text;

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.className='edit-btn';
    edit.onclick=()=>{
      const t=prompt("修正",e.text);
      if(t!==null){ e.text=t; save(); }
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=()=>{
      if(confirm("削除する？")){
        entries=entries.filter(x=>x.id!==e.id);
        save();
      }
    };

    div.append(heart,meta,text,edit,del);

    /* ⭐タグ操作 */

const tagDiv=document.createElement('div');

(e.tags||[]).forEach(t=>{
  const span=document.createElement('span');
  span.className='tag';
  span.innerText=t;

  const delBtn=document.createElement('button');
  delBtn.innerText='🗑';
  delBtn.onclick=()=>{
    if(!confirm("削除する？")) return;

    e.tags = (e.tags || []).filter(x=>x!==t);
    save();
  };

  tagDiv.append(span,delBtn);
});

    const addBtn=document.createElement('button');
    addBtn.innerText='➕';

    const picker=document.createElement('div');
    picker.className='tag-picker';
    picker.style.display='none';

    tags.forEach(t=>{
      const tagBtn=document.createElement('span');
      tagBtn.className='tag';
      tagBtn.innerText=t;

      tagBtn.onclick=()=>{
        if(!e.tags) e.tags=[];
        if(!e.tags.includes(t)){
          e.tags.push(t);
          save();
        }
      };

      picker.appendChild(tagBtn);
    });

    addBtn.onclick=()=>{
      picker.style.display = picker.style.display==='none' ? 'block' : 'none';
    };

    tagDiv.append(addBtn,picker);
    div.appendChild(tagDiv);

    list.appendChild(div);
  });
}

/* 保存 */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
  renderTagFilter();
}

/* バックアップ */
el('backupBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({entries,tags})]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup.json';
  a.click();

  localStorage.setItem('backupDate',Date.now());
  updateBackupInfo();
};

el('restoreBtn').onclick=()=>{
  const file=el('fileInput').files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=e=>{
    const d=JSON.parse(e.target.result);
    entries=d.entries||[];
    tags=d.tags||[];
    save();

    localStorage.setItem('backupDate',Date.now());
    updateBackupInfo();
  };
  reader.readAsText(file);
};

function updateBackupInfo(){
  const last=localStorage.getItem('backupDate');
  el('backupInfo').innerText=
    last ? "📦 最終："+new Date(Number(last)).toLocaleString('ja-JP')
         : "📦 未バックアップ";
}

function checkBackupReminder(){
  const last = localStorage.getItem('backupReminderDate');
  const now = Date.now();

  if(!last || (now - Number(last)) > 5*24*60*60*1000){
    setTimeout(()=>{
      alert("📦 そろそろバックアップしませんか？");
    },500);

    localStorage.setItem('backupReminderDate', now);
  }
}
let calOpen = localStorage.getItem('calOpen') !== 'false';

function updateCal(){
  el('calendarWrap').style.display = calOpen ? 'block' : 'none';
}

el('toggleCal').onclick=()=>{
  calOpen = !calOpen;
  localStorage.setItem('calOpen', calOpen);
  updateCal();
};

updateCal();
draw();
render();
renderTags();
renderTagFilter();
updateBackupInfo();
updateTypeUI();
checkBackupReminder();

}catch(e){
  document.body.innerHTML="<pre>"+e+"</pre>";
}

</script>
</body>
</html>
