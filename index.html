<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

button{
  background:#dff5df;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

.space{ margin-top:18px; }

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.week{
  text-align:center;
  font-size:12px;
  color:#888;
}

.day{
  padding:8px;
  background:white;
  border-radius:6px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }
.sunday{ border:2px solid #ff8a8a; } /* 少し柔らかい赤 */

/* ナビ */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

/* 🌿 タイプ選択（やさしい色） */
.type-active{
  background:#e8f7f3;
  border:2px solid #8fd3c7;
}

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
  border:2px solid transparent;
}

/* 🔵 やさしい水色 */
.tag.selected{
  background:#eaf6fb;
  border:2px solid #9ed0e6;
  box-shadow:0 0 0 2px rgba(158,208,230,0.25);
}

.tag button{
  margin-left:5px;
  font-size:10px;
}

/* 入力 */
.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}
textarea{ flex:1; height:60px; }

/* 投稿 */
.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}
.entry.memo{
  border-left:5px solid #9edfb5; /* 少しやさしい緑 */
}

.meta{ font-size:12px; color:#888; }

.heart{ cursor:pointer; font-size:18px; }
.heart.on{ color:#7ec8e3; }

.edit-btn{ position:absolute; right:40px; top:6px; }
.delete-btn{ position:absolute; right:8px; top:6px; }

.active{ background:#bfe8bf; }

.small{ font-size:12px; color:#666; }
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<button id="backupBtn">📦 バックアップ</button><br>
<label class="small">
📥 バックアップファイル（.json）
<input type="file" id="fileInput">
</label><br>
<button id="restoreBtn">復元する</button>
<div id="backupInfo" class="small"></div>

<div class="space"></div>

<div class="nav">
<button id="prevYear">⏪</button>
<button id="prevMonth">◀</button>
<div id="monthLabel"></div>
<button id="nextMonth">▶</button>
<button id="nextYear">⏩</button>
</div>

<div class="calendar">
<div class="week">日</div><div class="week">月</div><div class="week">火</div>
<div class="week">水</div><div class="week">木</div><div class="week">金</div><div class="week">土</div>
</div>

<div id="calendar" class="calendar"></div>

<div class="space"></div>

<button id="symptomBtn">🩺 症状</button>
<button id="memoBtn">💊 薬</button>

<div>
<input id="tagInput" placeholder="タグ追加">
<button id="addTagBtn">追加</button>
</div>
<div id="tagList"></div>

<div class="input-area">
<textarea id="text"></textarea>
<button id="sendBtn">送信</button>
</div>

<div>
<button id="allBtn">すべて</button>
<button id="favBtn">♡のみ</button>
</div>

<div id="list"></div>

<script>
try{

function el(id){ return document.getElementById(id); }

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedDate=new Date().toISOString().slice(0,10);
let current=new Date();
let selectedTags=[];
let currentFilter='all';
let currentType='symptom';

/* タイプ */
function updateTypeUI(){
  el('symptomBtn').classList.remove('type-active');
  el('memoBtn').classList.remove('type-active');

  if(currentType==='symptom'){
    el('symptomBtn').classList.add('type-active');
  }else{
    el('memoBtn').classList.add('type-active');
  }
}

el('symptomBtn').onclick=()=>{currentType='symptom';updateTypeUI();};
el('memoBtn').onclick=()=>{currentType='memo';updateTypeUI();};

/* カレンダー */
function draw(){
  const y=current.getFullYear();
  const m=current.getMonth();

  el('monthLabel').innerText=y+"年 "+(m+1)+"月";
  const cal=el('calendar');
  cal.innerHTML='';

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++){
    cal.appendChild(document.createElement('div'));
  }

  for(let i=1;i<=last;i++){
    const d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');

    const div=document.createElement('div');
    div.className='day';

    if(d===selectedDate) div.classList.add('active');

    const index=first+(i-1);
    if(index%7===0) div.classList.add('sunday');

    div.innerText=i;
    div.onclick=()=>{selectedDate=d;draw();render();};

    cal.appendChild(div);
  }
}

/* 以下JSは変更なし（安全） */

el('addTagBtn').onclick=()=>{
  const v=el('tagInput').value;
  if(!v)return;
  tags.push(v);
  el('tagInput').value='';
  save();
};

function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag'+(selectedTags.includes(t)?' selected':'');

    span.innerText=t;

    span.onclick=()=>{
      selectedTags.includes(t)
      ? selectedTags=selectedTags.filter(x=>x!==t)
      : selectedTags.push(t);
      renderTags();
    };

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=(e)=>{
      e.stopPropagation();
      const n=prompt("変更",t);
      if(!n)return;
      tags=tags.map(x=>x===t?n:x);
      entries.forEach(e=>e.tags=e.tags?.map(x=>x===t?n:x));
      save();
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=(e)=>{
      e.stopPropagation();
      if(!confirm("削除する？"))return;
      tags=tags.filter(x=>x!==t);
      entries.forEach(e=>e.tags=e.tags?.filter(x=>x!==t));
      save();
    };

    span.append(edit,del);
    area.appendChild(span);
  });
}

el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    id:Date.now(),
    text:txt,
    date:selectedDate,
    fav:false,
    tags:[...selectedTags],
    type:currentType,
    createdAt:Date.now()
  });

  el('text').value='';
  selectedTags=[];
  save();
};

function render(){
  const list=el('list');
  list.innerHTML='';

  let arr=entries.filter(e=>e.date===selectedDate);
  if(currentFilter==='fav') arr=arr.filter(e=>e.fav);

  arr.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry '+(e.type==='memo'?'memo':'');

    const heart=document.createElement('span');
    heart.className='heart '+(e.fav?'on':'');
    heart.innerText=e.fav?'🩵':'♡';
    heart.onclick=()=>{e.fav=!e.fav;save();};

    const meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=new Date(e.createdAt).toLocaleString();

    const text=document.createElement('div');
    text.innerText=e.text;

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.className='edit-btn';
    edit.onclick=()=>{e.text=prompt("修正",e.text)||e.text;save();};

    const del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=()=>{if(confirm("削除する？")){entries=entries.filter(x=>x.id!==e.id);save();}};

    div.append(heart,meta,text,edit,del);
    list.appendChild(div);
  });
}

el('allBtn').onclick=()=>{currentFilter='all';render();};
el('favBtn').onclick=()=>{currentFilter='fav';render();};

function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

el('backupBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({entries,tags})]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup.json';
  a.click();

  localStorage.setItem('backupDate',Date.now());
  updateBackupInfo();
};

el('restoreBtn').onclick=()=>{
  const file=el('fileInput').files[0];
  if(!file)return alert("ファイル選択してね");

  const reader=new FileReader();
  reader.onload=e=>{
    const d=JSON.parse(e.target.result);
    entries=d.entries||[];
    tags=d.tags||[];
    save();
    localStorage.setItem('backupDate',Date.now());
    updateBackupInfo();
  };
  reader.readAsText(file);
};

function updateBackupInfo(){
  const last=localStorage.getItem('backupDate');
  el('backupInfo').innerText=last
    ? "📦 最終："+new Date(Number(last)).toLocaleString('ja-JP')
    : "📦 未バックアップ";
}

el('prevMonth').onclick=()=>{current.setMonth(current.getMonth()-1);draw();};
el('nextMonth').onclick=()=>{current.setMonth(current.getMonth()+1);draw();};
el('prevYear').onclick=()=>{current.setFullYear(current.getFullYear()-1);draw();};
el('nextYear').onclick=()=>{current.setFullYear(current.getFullYear()+1);draw();};

draw();
render();
renderTags();
updateBackupInfo();
updateTypeUI();

}catch(e){
  document.body.innerHTML="<h2>エラー発生</h2><pre>"+e+"</pre>";
}
</script>

</body>
</html>
