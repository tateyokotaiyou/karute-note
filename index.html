<!DOCTYPE html>
<!-- update -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>カルテノート</title>

<link rel="icon" type="image/png" sizes="192x192" href="icon-192.PNG">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.PNG">
<link rel="apple-touch-icon" href="icon-192.PNG">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
}
h2{ color:#6fbf73; text-align:center; }
button{
  background:#dff5df;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  padding:8px;
  background:white;
  border-radius:6px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }
.day.today{ background:#e6f7ff; }
.sunday{ border:2px solid #ff8a8a; }

.nav{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
  cursor:pointer;
}
.tag.selected{
  background:#eaf6fb;
  border:2px solid #9ed0e6;
}

.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
}
.entry.memo{ border-left:5px solid #9edfb5; }

.small{ font-size:12px; color:#666; }

textarea{
  width:100%;
  height:120px;
}
</style>
</head>

<body>

<h2>カルテノート</h2>

<button id="backupBtn">📦 バックアップ</button><br>
<div class="small">バックアップファイル選択</div>
<input type="file" id="fileInput"><br>
<button id="restoreBtn">復元</button>
<div id="backupInfo" class="small"></div>

<hr>

<button id="toggleCal">📅 カレンダー表示/非表示</button>

<div id="calendarWrap">
  <div class="nav">
    <button id="prevMonth">◀</button>
    <div id="monthLabel"></div>
    <button id="nextMonth">▶</button>
  </div>
  <div id="calendar" class="calendar"></div>
</div>

<hr>

<div class="small">タグ🏷</div>
<input id="tagInput">
<button id="addTagBtn">追加</button>
<div id="tagList"></div>

<textarea id="text"></textarea>
<button id="sendBtn">送信</button>

<div class="small">タグ検索🔍</div>
<div id="tagFilterArea"></div>

<div id="list"></div>

<script>
const el=id=>document.getElementById(id);

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let activeTagFilter=null;

let current=new Date();
let selectedDate=formatDate(current);

function formatDate(d){
  return d.toISOString().slice(0,10);
}

/* カレンダー */
function draw(){
  const cal=el('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();
  el('monthLabel').innerText=y+"年 "+(m+1)+"月";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++){
    cal.appendChild(document.createElement('div'));
  }

  for(let i=1;i<=last;i++){
    const d=formatDate(new Date(y,m,i));
    const div=document.createElement('div');

    div.className='day';
    if(d===selectedDate) div.classList.add('active');

    div.innerText=i;
    div.onclick=()=>{
      selectedDate=d;
      draw();
      render();
    };

    cal.appendChild(div);
  }
}

el('prevMonth').onclick=()=>{current.setMonth(current.getMonth()-1);draw();}
el('nextMonth').onclick=()=>{current.setMonth(current.getMonth()+1);draw();}

/* タグ表示 */
function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag'+(selectedTags.includes(t)?' selected':'');
    span.innerText=t;

    span.onclick=()=>{
      selectedTags.includes(t)
        ? selectedTags=selectedTags.filter(x=>x!==t)
        : selectedTags.push(t);
      renderTags();
    };

    area.appendChild(span);
  });
}

/* タグ検索 */
function renderTagFilter(){
  const area=el('tagFilterArea');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag'+(activeTagFilter===t?' selected':'');
    span.innerText=t;

    span.onclick=()=>{
      activeTagFilter = activeTagFilter===t ? null : t;
      renderTagFilter();
      render();
    };

    area.appendChild(span);
  });
}

/* タグ追加 */
el('addTagBtn').onclick=()=>{
  const v=el('tagInput').value;
  if(!v)return;
  tags.push(v);
  el('tagInput').value='';
  save();
};

/* 投稿 */
el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    text:txt,
    date:selectedDate,
    tags:[...selectedTags]
  });

  el('text').value='';
  selectedTags=[];
  save();
};

/* 表示 */
function render(){
  const list=el('list');
  list.innerHTML='';

  let arr=entries.filter(e=>e.date===selectedDate);

  if(activeTagFilter){
    arr=arr.filter(e=>e.tags?.includes(activeTagFilter));
  }

  arr.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry';
    div.innerText=e.text;
    list.appendChild(div);
  });
}

/* 保存（←ここが重要修正） */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
  renderTagFilter();
}

/* バックアップ */
el('backupBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({entries,tags})]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup.json';
  a.click();
};

/* 復元 */
el('restoreBtn').onclick=()=>{
  const file=el('fileInput').files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=e=>{
    const d=JSON.parse(e.target.result);
    entries=d.entries||[];
    tags=d.tags||[];
    save();
  };
  reader.readAsText(file);
};

/* カレンダー開閉 */
let calOpen=true;
el('toggleCal').onclick=()=>{
  calOpen=!calOpen;
  el('calendarWrap').style.display=calOpen?'block':'none';
};

/* 初期化 */
draw();
render();
renderTags();
renderTagFilter();

</script>

</body>
</html>
