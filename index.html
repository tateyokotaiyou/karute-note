<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-bottom:16px;
}

.day{
  padding:10px;
  background:white;
  border-radius:8px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:3px 7px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}
.tag button{
  font-size:10px;
  margin-left:6px;
  opacity:0.6;
}

/* 入力 */
.input-area{
  display:flex;
  gap:8px;
}

textarea{
  flex:1;
  height:60px;
  border-radius:8px;
  border:1px solid #ccc;
  padding:10px;
}

/* 投稿 */
.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
}

.meta{
  font-size:12px;
  color:#888;
}

/* ❤️ */
.heart{
  font-size:20px;
  margin-right:6px;
  cursor:pointer;
  transition:0.2s;
}
.heart.off{ color:#ccc; }
.heart.on{ color:#f48aa0; }

/* フィルター */
.filter{
  margin:10px 0;
}
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<!-- バックアップ -->
<div style="margin:10px 0;">
  <button onclick="exportData()">📦 バックアップ</button>
  <input type="file" id="importFile" onchange="showFileName()">
  <span id="fileName" style="font-size:12px;"></span>
  <button onclick="importData()">📥 復元</button>
</div>

<!-- フィルター -->
<div class="filter">
  <button onclick="setFilter('all')">すべて</button>
  <button onclick="setFilter('fav')">♡のみ</button>
</div>

<!-- カレンダー -->
<div id="calendar" class="calendar"></div>

<!-- タグ -->
<input id="tagInput" placeholder="タグ追加">
<button onclick="addTag()">追加</button>
<div id="tagList"></div>

<!-- 入力 -->
<div class="input-area">
  <textarea id="text"></textarea>
  <button onclick="add()">送信</button>
</div>

<div id="list"></div>

<script>
var entries = JSON.parse(localStorage.getItem('data')||'[]');
var tags = JSON.parse(localStorage.getItem('tags')||'[]');

var selectedTags=[];
var current=new Date();
var selectedDate=formatDate(current);
var currentFilter='all';

/* 日付 */
function formatDate(d){
  return d.toISOString().slice(0,10);
}

function formatDateTime(ts){
  return new Date(ts).toLocaleString();
}

/* カレンダー */
function drawCalendar(){
  var cal=document.getElementById('calendar');
  cal.innerHTML='';
  var y=current.getFullYear();
  var m=current.getMonth();
  var last=new Date(y,m+1,0).getDate();

  for(var i=1;i<=last;i++){
    var d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');
    var div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.innerText=i;
    div.onclick=(function(date){
      return function(){
        selectedDate=date;
        render();
        drawCalendar();
      }
    })(d);
    cal.appendChild(div);
  }
}

/* タグ */
function addTag(){
  var val=document.getElementById('tagInput').value;
  if(!val)return;
  tags.push(val);
  saveAll();
  document.getElementById('tagInput').value='';
}

function renderTags(){
  var el=document.getElementById('tagList');
  el.innerHTML='';

  tags.forEach(function(t){
    var span=document.createElement('span');
    span.className='tag';

    var text=document.createElement('span');
    text.innerText=t;
    text.onclick=function(){
      toggleTag(t);
      renderTags();
    };

    var edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=function(){ renameTag(t); };

    var del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=function(){ deleteTag(t); };

    span.appendChild(text);
    span.appendChild(edit);
    span.appendChild(del);

    el.appendChild(span);
  });
}

function toggleTag(tag){
  if(selectedTags.includes(tag)){
    selectedTags=selectedTags.filter(t=>t!==tag);
  }else{
    selectedTags.push(tag);
  }
}

function renameTag(tag){
  var n=prompt("名前変更",tag);
  if(!n)return;

  tags=tags.map(t=>t===tag?n:t);
  entries.forEach(e=>{
    e.tags=e.tags.map(t=>t===tag?n:t);
  });

  saveAll();
}

function deleteTag(tag){
  if(!confirm("削除する？")) return;

  tags=tags.filter(t=>t!==tag);
  entries.forEach(e=>{
    e.tags=e.tags.filter(t=>t!==tag);
  });

  saveAll();
}

/* 投稿 */
function add(){
  var text=document.getElementById('text').value;
  if(!text)return;

  entries.unshift({
    id:Date.now(),
    text:text,
    date:selectedDate,
    fav:false,
    tags:selectedTags.slice(),
    createdAt:Date.now()
  });

  document.getElementById('text').value='';
  selectedTags=[];
  saveAll();
}

/* ❤️ */
function toggleFav(id){
  var item=entries.find(e=>e.id===id);
  item.fav=!item.fav;
  saveAll();
}

/* フィルター */
function setFilter(type){
  currentFilter=type;
  render();
}

/* 表示 */
function render(){
  var list=document.getElementById('list');
  list.innerHTML='';

  var filtered=entries.filter(e=>e.date===selectedDate);
  if(currentFilter==='fav'){
    filtered=filtered.filter(e=>e.fav);
  }

  filtered.forEach(function(e){
    var div=document.createElement('div');
    div.className='entry';

    var heart=document.createElement('span');
    heart.className='heart ' + (e.fav?'on':'off');
    heart.innerText = e.fav ? '❤️' : '♡';
    heart.onclick=function(){ toggleFav(e.id); };

    var meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=formatDateTime(e.createdAt);

    var text=document.createElement('div');
    text.innerText=e.text;

    div.appendChild(heart);
    div.appendChild(meta);
    div.appendChild(text);

    var tagDiv=document.createElement('div');
    e.tags.forEach(function(t){
      var span=document.createElement('span');
      span.className='tag';
      span.innerText=t;
      tagDiv.appendChild(span);
    });

    div.appendChild(tagDiv);
    list.appendChild(div);
  });
}

function saveAll(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

/* ファイル名 */
function showFileName(){
  var file=document.getElementById('importFile').files[0];
  document.getElementById('fileName').innerText=file?file.name:'';
}

/* バックアップ */
function exportData(){
  var blob=new Blob([JSON.stringify({entries,tags})]);
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();
}

/* 復元 */
function importData(){
  var file=document.getElementById('importFile').files[0];
  if(!file)return;

  if(!confirm("上書きされます。OK？")) return;

  var reader=new FileReader();
  reader.onload=function(e){
    var data=JSON.parse(e.target.result);
    entries=data.entries||[];
    tags=data.tags||[];
    saveAll();
  };
  reader.readAsText(file);
}

drawCalendar();
render();
renderTags();
</script>

</body>
</html>
