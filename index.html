<head>

<style>
body{

}

button{
  background:#dff5df;

  text-align:center;
}

}

.day.active{ background:#bfe8bf; }

.week{
  font-size:12px;
  text-align:center;
  color:#888;
}

.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:12px;
}
.type-btn.active.symptom{ border-color:#8bbcf5; color:#4a90e2; }
.type-btn.active.memo{ border-color:#8fd694; color:#4caf50; }

</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<!-- バックアップ -->
<div>
<button onclick="exportData()">📦 バックアップ</button>

<label class="small">
📥 バックアップファイル（.json）
<input type="file" id="importFile" accept=".json" onchange="showFileName()">
</label>

<div id="fileName" class="small"></div>
<button onclick="importData()">復元する</button>

<div id="backupInfo" class="backup-info"></div>
</div>

<!-- スペース -->
<div class="section-space"></div>

<!-- ナビ -->
<div class="month-nav">
<button onclick="changeYear(-1)">⏪</button>
<button onclick="changeMonth(-1)">◀</button>

<div id="monthLabel"></div>

<button onclick="changeMonth(1)">▶</button>
<button onclick="changeYear(1)">⏩</button>
</div>

<!-- 曜日 -->
<div class="calendar">
<div class="week">日</div><div class="week">月</div><div class="week">火</div>
<div class="week">水</div><div class="week">木</div><div class="week">金</div><div class="week">土</div>
</div>

<div id="calendar" class="calendar"></div>

<!-- スペース -->
<div class="section-space"></div>

<!-- タイプ -->
<div>
<button class="type-btn active symptom" onclick="setType('symptom',this)">🩺 症状</button>
<button class="type-btn memo" onclick="setType('memo',this)">💊 薬</button>
</div>

<script>
let current=new Date();
let selectedDate=formatDate(current);

function formatDate(d){return d.toISOString().slice(0,10);}

/* 年月 */
function changeYear(diff){
  current.setFullYear(current.getFullYear()+diff);
  drawCalendar();
}
function changeMonth(diff){
  current.setMonth(current.getMonth()+diff);
  drawCalendar();
}

/* カレンダー */
function drawCalendar(){
  const y=current.getFullYear();
  const m=current.getMonth();

  document.getElementById('monthLabel').innerText=y+"年 "+(m+1)+"月";

  const cal=document.getElementById('calendar');
  cal.innerHTML='';

  const firstDay=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    cal.appendChild(document.createElement('div'));
  }

  for(let i=1;i<=last;i++){
    const d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');

    const div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.innerText=i;

    // ⭐日曜判定
    const dayOfWeek=new Date(y,m,i).getDay();
    if(dayOfWeek===0){
      div.classList.add('sunday');
    }

    div.onclick=()=>{
      selectedDate=d;
      drawCalendar();
    };

    cal.appendChild(div);
  }
}

/* バックアップ */
function exportData(){
  const blob=new Blob(["{}"]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();

  localStorage.setItem('backupDate',Date.now());
  updateBackupInfo();
}
