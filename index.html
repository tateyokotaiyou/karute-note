<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

/* 月 */
.month-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  padding:10px;
  background:white;
  border-radius:8px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

/* タイプ */
.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:12px;
}
.type-btn.active.symptom{
  border-color:#8bbcf5;
  color:#4a90e2;
}
.type-btn.active.memo{
  border-color:#8fd694;
  color:#4caf50;
}

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:3px 7px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}
.tag.selected{
  background:#bfe8bf;
}
.tag button{
  font-size:10px;
  margin-left:6px;
  opacity:0.6;
}

/* 入力 */
.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}
textarea{
  flex:1;
  height:60px;
  border-radius:8px;
  border:1px solid #ccc;
  padding:10px;
}

/* 投稿 */
.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}
.entry.memo{
  border-left:5px solid #8fd694;
}

.meta{
  font-size:12px;
  color:#888;
}

.delete-btn{
  position:absolute;
  right:8px;
  top:8px;
  background:none;
}
.edit-btn{
  position:absolute;
  right:40px;
  top:8px;
  background:none;
}

/* ハート */
.heart{
  font-size:18px;
  margin-right:6px;
  cursor:pointer;
}
.heart.off{ color:#bbb; }
.heart.on{
  color:#7ec8e3;
  transform:scale(1.2);
}
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<!-- 月 -->
<div class="month-nav">
  <button onclick="changeMonth(-1)">◀</button>
  <div id="monthLabel"></div>
  <button onclick="changeMonth(1)">▶</button>
</div>

<div id="calendar" class="calendar"></div>

<!-- タイプ -->
<div style="margin-top:10px;">
  <button class="type-btn active symptom" onclick="setType('symptom',this)">🩺 症状</button>
  <button class="type-btn memo" onclick="setType('memo',this)">💊 薬</button>
</div>

<!-- タグ -->
<div style="margin-top:10px;">
  <input id="tagInput" placeholder="タグ追加">
  <button onclick="addTag()">追加</button>
</div>
<div id="tagList"></div>

<!-- 入力 -->
<div class="input-area">
  <textarea id="text"></textarea>
  <button onclick="add()">送信</button>
</div>

<!-- フィルター -->
<div style="margin:10px 0;">
  <button onclick="setFilter('all')">すべて</button>
  <button onclick="setFilter('fav')">♡のみ</button>
</div>

<div id="list"></div>

<script>
let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let currentType='symptom';
let current=new Date();
let selectedDate=formatDate(current);
let currentFilter='all';

/* 日付 */
function formatDate(d){return d.toISOString().slice(0,10);}
function formatDateTime(ts){
  return new Date(ts).toLocaleString('ja-JP',{
    month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'
  });
}

/* 月 */
function changeMonth(diff){
  current.setMonth(current.getMonth()+diff);
  drawCalendar();
}

/* カレンダー */
function drawCalendar(){
  document.getElementById('monthLabel').innerText=
    current.getFullYear()+"年 "+(current.getMonth()+1)+"月";

  const cal=document.getElementById('calendar');
  cal.innerHTML='';
  const y=current.getFullYear();
  const m=current.getMonth();
  const last=new Date(y,m+1,0).getDate();

  for(let i=1;i<=last;i++){
    const d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');
    const div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.innerText=i;
    div.onclick=()=>{selectedDate=d;render();drawCalendar();}
    cal.appendChild(div);
  }
}

/* タイプ */
function setType(type,el){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

/* タグ */
function addTag(){
  const val=document.getElementById('tagInput').value;
  if(!val)return;
  tags.push(val);
  saveAll();
  document.getElementById('tagInput').value='';
}

function renderTags(){
  const el=document.getElementById('tagList');
  el.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag';
    if(selectedTags.includes(t)) span.classList.add('selected');

    const text=document.createElement('span');
    text.innerText=t;
    text.onclick=()=>{
      toggleTag(t);
      renderTags();
    };

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=(e)=>{
      e.stopPropagation();
      renameTag(t);
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=(e)=>{
      e.stopPropagation();
      deleteTag(t);
    };

    span.appendChild(text);
    span.appendChild(edit);
    span.appendChild(del);
    el.appendChild(span);
  });
}

function toggleTag(tag){
  if(selectedTags.includes(tag)){
    selectedTags=selectedTags.filter(t=>t!==tag);
  }else{
    selectedTags.push(tag);
  }
}

function renameTag(tag){
  const n=prompt("タグ名変更",tag);
  if(!n)return;
  tags=tags.map(t=>t===tag?n:t);
  entries.forEach(e=>e.tags=e.tags.map(t=>t===tag?n:t));
  saveAll();
}

function deleteTag(tag){
  if(!confirm("このタグ削除しても大丈夫？"))return;
  tags=tags.filter(t=>t!==tag);
  entries.forEach(e=>e.tags=e.tags.filter(t=>t!==tag));
  saveAll();
}

/* 投稿 */
function add(){
  const text=document.getElementById('text').value;
  if(!text)return;

  entries.unshift({
    id:Date.now(),
    text,
    date:selectedDate,
    type:currentType,
    fav:false,
    tags:[...selectedTags],
    createdAt:Date.now()
  });

  document.getElementById('text').value='';
  selectedTags=[];
  saveAll();
}

/* 編集 */
function editEntry(id){
  const item=entries.find(e=>e.id===id);
  const t=prompt("修正",item.text);
  if(t!==null){item.text=t;saveAll();}
}

/* 削除 */
function deleteEntry(id){
  if(!confirm("この記録を削除しても大丈夫？"))return;
  entries=entries.filter(e=>e.id!==id);
  saveAll();
}

/* ❤️ */
function toggleFav(id){
  const item=entries.find(e=>e.id===id);
  item.fav=!item.fav;
  saveAll();
}

/* フィルター */
function setFilter(type){
  currentFilter=type;
  render();
}

/* 表示 */
function render(){
  const list=document.getElementById('list');
  list.innerHTML='';

  let filtered=entries.filter(e=>e.date===selectedDate);
  if(currentFilter==='fav') filtered=filtered.filter(e=>e.fav);

  filtered.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry '+e.type;

    const heart=document.createElement('span');
    heart.className='heart '+(e.fav?'on':'off');
    heart.innerText=e.fav?'🩵':'♡';
    heart.onclick=()=>toggleFav(e.id);

    const meta=document.createElement('div');
    meta.className='meta';
    meta.innerText="🕒 "+formatDateTime(e.createdAt);

    const text=document.createElement('div');
    text.innerText=e.text;

    const del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=()=>deleteEntry(e.id);

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.className='edit-btn';
    edit.onclick=()=>editEntry(e.id);

    div.append(del,edit,heart,meta,text);

    const tagDiv=document.createElement('div');
    e.tags.forEach(t=>{
      const span=document.createElement('span');
      span.className='tag';
      span.innerText=t;
      tagDiv.appendChild(span);
    });

    div.appendChild(tagDiv);
    list.appendChild(div);
  });
}

function saveAll(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

drawCalendar();
render();
renderTags();
</script>

</body>
</html>
