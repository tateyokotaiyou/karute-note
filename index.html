<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

/* 🔽 バックアップUI */
.backup-box{
  margin-bottom:10px;
}
.small{ font-size:12px; color:#666; }

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.week{
  font-size:12px;
  text-align:center;
  color:#888;
}

/* ⭐ 少し小さく */
.day{
  padding:6px;
  background:white;
  border-radius:8px;
  text-align:center;
  font-size:14px;
}

.sunday{
  border:2px solid #ff6b6b;
}

.day.active{ background:#bfe8bf; }

.month-nav{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
  cursor:pointer;
}
.tag.selected{
  background:#bfe8bf;
}
.tag button{
  margin-left:4px;
  font-size:10px;
}

/* 入力 */
.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}

textarea{
  flex:1;
  height:60px;
}

/* 投稿 */
.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}

.meta{ font-size:12px; color:#888; }

.heart{ font-size:18px; cursor:pointer; }
.heart.on{ color:#7ec8e3; }

.edit-btn{ position:absolute; right:40px; top:6px; }
.delete-btn{ position:absolute; right:8px; top:6px; }

.active-filter{
  background:#bfe8bf;
}
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<!-- 🔽 バックアップ -->
<div class="backup-box">
<button onclick="exportData()">📦 バックアップ</button>

<div class="small">
📥 バックアップファイル（.json）
<input type="file" id="importFile">
</div>

<button onclick="importData()">復元する</button>

<div id="backupInfo" class="small"></div>
</div>

<!-- カレンダー -->
<div class="month-nav">
<button onclick="changeYear(-1)">⏪</button>
<button onclick="changeMonth(-1)">◀</
