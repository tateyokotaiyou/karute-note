<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f5f0e8;
  padding:20px;
}

h1{margin-bottom:10px}

/* 月ヘッダー */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-bottom:15px;
}

.day{
  padding:10px;
  background:white;
  text-align:center;
  cursor:pointer;
  border:1px solid #ddd;
  border-radius:6px;
}

.day.active{
  background:#c2543a;
  color:white;
}

/* フィルター */
.controls{
  margin-bottom:10px;
}

/* 入力 */
textarea{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  margin-top:8px;
  padding:6px 12px;
  border:none;
  border-radius:6px;
  background:#333;
  color:white;
  cursor:pointer;
}

/* エントリー */
.entry{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-left:6px solid #c2543a;
  border-radius:6px;
}

/* 色分け */
.entry.memo{
  border-color:#4a7c6f;
}

.entry.symptom{
  border-color:#c2543a;
}

/* 星 */
.star{
  cursor:pointer;
  font-size:18px;
  margin-right:6px;
}

/* タイプタグ */
.tag{
  font-size:12px;
  margin-right:6px;
}

.tag.symptom{ color:#c2543a; }
.tag.memo{ color:#4a7c6f; }

</style>
</head>

<body>

<h1>カルテノート</h1>

<div class="header">
  <button onclick="prevMonth()">◀</button>
  <div id="monthLabel"></div>
  <button onclick="nextMonth()">▶</button>
</div>

<div class="controls">
  <button onclick="toggleStarFilter()">⭐のみ表示</button>
</div>

<div id="calendar" class="calendar"></div>

<!-- 種類選択 -->
<div>
  <button onclick="setType('symptom')">🩺 症状</button>
  <button onclick="setType('memo')">💊 薬</button>
</div>

<textarea id="text"></textarea>
<br>
<button onclick="add()">記録</button>

<div id="list"></div>

<script>
let entries = JSON.parse(localStorage.getItem('data')||'[]');

let current = new Date();
let selectedDate = formatDate(current);
let starOnly = false;
let currentType = 'symptom';

function formatDate(d){
  return d.toISOString().slice(0,10);
}

function drawCalendar(){
  const cal=document.getElementById('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();

  document.getElementById('monthLabel').textContent = `${y}年 ${m+1}月`;

  const last=new Date(y,m+1,0).getDate();

  for(let i=1;i<=last;i++){
    const d=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;

    const div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.textContent=i;

    div.onclick=()=>{
      selectedDate=d;
      render();
      drawCalendar();
    };

    cal.appendChild(div);
  }
}

function prevMonth(){
  current.setMonth(current.getMonth()-1);
  drawCalendar();
}

function nextMonth(){
  current.setMonth(current.getMonth()+1);
  drawCalendar();
}

function setType(type){
  currentType = type;
}

function add(){
  const text=document.getElementById('text').value;
  if(!text)return;

  entries.unshift({
    text,
    date:selectedDate,
    star:false,
    type:currentType
  });

  localStorage.setItem('data',JSON.stringify(entries));
  document.getElementById('text').value='';
  render();
}

function toggleStar(i){
  entries[i].star=!entries[i].star;
  localStorage.setItem('data',JSON.stringify(entries));
  render();
}

function toggleStarFilter(){
  starOnly=!starOnly;
  render();
}

function render(){
  const list=document.getElementById('list');

  let filtered = entries.filter(e=>e.date===selectedDate);

  if(starOnly){
    filtered = filtered.filter(e=>e.star);
  }

  if(filtered.length===0){
    list.innerHTML='記録なし';
    return;
  }

  list.innerHTML=filtered.map((e,i)=>`
    <div class="entry ${e.type}">
      <span class="star" onclick="toggleStar(${i})">
        ${e.star?'⭐':'☆'}
      </span>
      <span class="tag ${e.type}">
        ${e.type==='symptom'?'症状':'薬'}
      </span>
      ${e.text}
    </div>
  `).join('');
}

drawCalendar();
render();
</script>

</body>
</html>
