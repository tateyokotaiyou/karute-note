<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

button.active-filter{
  background:#bfe8bf;
  font-weight:600;
}

.backup-info{
  font-size:12px;
  color:#666;
  margin-bottom:6px;
}

.month-nav{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  padding:10px;
  background:white;
  border-radius:8px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:12px;
}
.type-btn.active.symptom{
  border-color:#8bbcf5;
  color:#4a90e2;
}
.type-btn.active.memo{
  border-color:#8fd694;
  color:#4caf50;
}

.tag{
  display:inline-flex;
  background:#eef9ee;
  padding:3px 7px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}
.tag.selected{ background:#bfe8bf; }

.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}
textarea{
  flex:1;
  height:60px;
}

.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
}
.entry.memo{
  border-left:5px solid #8fd694;
}

.meta{ font-size:12px; color:#888; }

.heart{ font-size:18px; cursor:pointer; }
.heart.on{ color:#7ec8e3; }
.heart.off{ color:#bbb; }

</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<!-- バックアップ -->
<div>
<button onclick="exportData()">📦 バックアップ</button>
<input type="file" id="importFile" accept=".json" onchange="showFileName()">
<div id="fileName"></div>
<button onclick="importData()">復元</button>
</div>

<div id="backupInfo" class="backup-info"></div>

<!-- 月 -->
<div class="month-nav">
<button onclick="changeMonth(-1)">◀</button>
<div id="monthLabel"></div>
<button onclick="changeMonth(1)">▶</button>
</div>

<div id="calendar" class="calendar"></div>

<!-- タイプ -->
<div>
<button class="type-btn active symptom" onclick="setType('symptom',this)">🩺 症状</button>
<button class="type-btn memo" onclick="setType('memo',this)">💊 薬</button>
</div>

<!-- タグ -->
<input id="tagInput">
<button onclick="addTag()">追加</button>
<div id="tagList"></div>

<!-- 入力 -->
<div class="input-area">
<textarea id="text"></textarea>
<button onclick="add()">送信</button>
</div>

<!-- ⭐ フィルター -->
<div style="margin:10px 0;">
<button id="filterAll" onclick="setFilter('all')">すべて</button>
<button id="filterFav" onclick="setFilter('fav')">♡のみ</button>
</div>

<div id="list"></div>

<script>
let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let currentType='symptom';
let current=new Date();
let selectedDate=formatDate(current);
let currentFilter='all';

/* フィルター */
function setFilter(type){
  currentFilter=type;

  document.getElementById('filterAll').classList.remove('active-filter');
  document.getElementById('filterFav').classList.remove('active-filter');

  if(type==='all'){
    document.getElementById('filterAll').classList.add('active-filter');
  }else{
    document.getElementById('filterFav').classList.add('active-filter');
  }

  render();
}

/* バックアップ表示 */
function updateBackupInfo(){
  const last=localStorage.getItem('backupDate');
  const el=document.getElementById('backupInfo');

  if(!last){
    el.innerText="📦 未バックアップ";
    return;
  }

  const d=new Date(Number(last));
  el.innerText="📦 最終："+d.toLocaleString('ja-JP');
}

/* タイプ */
function setType(type,el){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function formatDate(d){return d.toISOString().slice(0,10);}

function changeMonth(diff){
  current.setMonth(current.getMonth()+diff);
  drawCalendar();
}

function drawCalendar(){
  document.getElementById('monthLabel').innerText=
    current.getFullYear()+"年 "+(current.getMonth()+1)+"月";

  const cal=document.getElementById('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();
  const last=new Date(y,m+1,0).getDate();

  for(let i=1;i<=last;i++){
    const d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');

    const div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.innerText=i;

    div.onclick=()=>{
      selectedDate=d;
      render();
      drawCalendar();
    };

    cal.appendChild(div);
  }
}

/* タグ */
function addTag(){
  const val=document.getElementById('tagInput').value;
  if(!val)return;
  tags.push(val);
  document.getElementById('tagInput').value='';
  saveAll();
}

function renderTags(){
  const el=document.getElementById('tagList');
  el.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag';

    if(selectedTags.includes(t)){
      span.classList.add('selected');
    }

    span.innerText=t;

    span.onclick=()=>{
      if(selectedTags.includes(t)){
        selectedTags=selectedTags.filter(x=>x!==t);
      }else{
        selectedTags.push(t);
      }
      renderTags();
    };

    el.appendChild(span);
  });
}

/* 投稿 */
function add(){
  const text=document.getElementById('text').value;
  if(!text)return;

  entries.unshift({
    id:Date.now(),
    text,
    date:selectedDate,
    type:currentType,
    fav:false,
    tags:[...selectedTags]
  });

  document.getElementById('text').value='';
  selectedTags=[];
  saveAll();
}

/* 表示 */
function render(){
  const list=document.getElementById('list');
  list.innerHTML='';

  let filtered=entries.filter(e=>e.date===selectedDate);

  if(currentFilter==='fav'){
    filtered=filtered.filter(e=>e.fav);
  }

  filtered.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry '+e.type;

    const heart=document.createElement('span');
    heart.className='heart '+(e.fav?'on':'off');
    heart.innerText=e.fav?'🩵':'♡';
    heart.onclick=()=>{e.fav=!e.fav;saveAll();};

    const text=document.createElement('div');
    text.innerText=e.text;

    div.append(heart,text);

    if(e.tags){
      const tagDiv=document.createElement('div');
      e.tags.forEach(t=>{
        const span=document.createElement('span');
        span.className='tag';
        span.innerText=t;
        tagDiv.appendChild(span);
      });
      div.appendChild(tagDiv);
    }

    list.appendChild(div);
  });
}

/* 保存 */
function saveAll(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

/* バックアップ */
function exportData(){
  const blob=new Blob([JSON.stringify({entries,tags})]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();

  localStorage.setItem('backupDate',Date.now());
  updateBackupInfo();
}

function importData(){
  const file=document.getElementById('importFile').files[0];
  if(!file)return alert("ファイル選択してね");

  const reader=new FileReader();
  reader.onload=e=>{
    const data=JSON.parse(e.target.result);
    entries=data.entries||[];
    tags=data.tags||[];
    saveAll();

    localStorage.setItem('backupDate',Date.now());
    updateBackupInfo();
  };
  reader.readAsText(file);
}

function showFileName(){
  const file=document.getElementById('importFile').files[0];
  document.getElementById('fileName').innerText=file?file.name:'';
}

drawCalendar();
render();
renderTags();
updateBackupInfo();
setFilter('all');
</script>

</body>
</html>
