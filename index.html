<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

/* タイトル */
h1{
  margin-bottom:15px;
  font-weight:600;
  letter-spacing:0.05em;
}
h1 span{
  color:#7bbf7b;
}

/* 月ヘッダー */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.nav-btn{
  background:#dff5df;
  color:#4f8f4f;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
  margin-bottom:15px;
}

.day{
  padding:10px;
  background:white;
  text-align:center;
  cursor:pointer;
  border:1px solid #ddd;
  border-radius:8px;
}

.day.active{
  background:#bfe8bf;
}

/* ボタン */
button{
  padding:6px 12px;
  border:none;
  border-radius:8px;
  background:#dff5df;
  color:#4f8f4f;
  cursor:pointer;
}

/* タイプ選択 */
.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:5px;
}

.type-btn.active.symptom{
  border-color:#a3c9f9;
  color:#4a90e2;
}

.type-btn.active.memo{
  border-color:#a8e6a3;
  color:#4caf50;
}

/* 入力 */
textarea{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
  margin-top:10px;
}

/* タグ */
.tag{
  display:inline-block;
  padding:3px 8px;
  background:#eef9ee;
  border-radius:10px;
  margin:2px;
  font-size:12px;
  cursor:pointer;
}

/* エントリー */
.entry{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-left:6px solid #bfe8bf;
  border-radius:8px;
  position:relative;
}

.entry.memo{
  border-color:#a8e6a3;
}

.star{
  cursor:pointer;
  margin-right:5px;
}

.delete-btn{
  position:absolute;
  right:8px;
  top:8px;
  background:none;
}
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<div class="header">
  <button class="nav-btn" onclick="prevMonth()">◀</button>
  <div id="monthLabel"></div>
  <button class="nav-btn" onclick="nextMonth()">▶</button>
</div>

<button onclick="toggleStarFilter()">⭐のみ表示</button>

<div id="calendar" class="calendar"></div>

<div>
  <button class="type-btn active symptom" onclick="setType('symptom', this)">症状</button>
  <button class="type-btn memo" onclick="setType('memo', this)">薬</button>
</div>

<textarea id="text" placeholder="Enterで記録 / Shift+Enterで改行"></textarea>

<br>

<label><input type="checkbox" id="starInput"> ⭐重要</label>

<!-- タグ -->
<div>
  <input id="tagInput" placeholder="タグ追加（例：頭痛）">
  <button onclick="addTag()">追加</button>
</div>

<div id="tagList"></div>

<br>

<button onclick="add()">記録</button>

<div id="list"></div>

<script>
let entries = JSON.parse(localStorage.getItem('data')||'[]');
let tags = JSON.parse(localStorage.getItem('tags')||'[]');

let current = new Date();
let selectedDate = formatDate(current);
let currentType = 'symptom';
let starOnly = false;
let selectedTags = [];

function formatDate(d){
  return d.toISOString().slice(0,10);
}

/* カレンダー */
function drawCalendar(){
  const cal=document.getElementById('calendar');
  cal.innerHTML='';
  const y=current.getFullYear();
  const m=current.getMonth();
  document.getElementById('monthLabel').textContent = `${y}年 ${m+1}月`;

  const last=new Date(y,m+1,0).getDate();

  for(let i=1;i<=last;i++){
    const d=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.textContent=i;
    div.onclick=()=>{selectedDate=d;render();drawCalendar()};
    cal.appendChild(div);
  }
}

/* タグ追加 */
function addTag(){
  const val=document.getElementById('tagInput').value.trim();
  if(!val)return;

  tags.push(val);
  localStorage.setItem('tags',JSON.stringify(tags));
  document.getElementById('tagInput').value='';
  renderTags();
}

/* タグ表示 */
function renderTags(){
  const el=document.getElementById('tagList');
  el.innerHTML = tags.map(t=>`
    <span class="tag" onclick="toggleTag('${t}')">${t}</span>
  `).join('');
}

function toggleTag(tag){
  if(selectedTags.includes(tag)){
    selectedTags = selectedTags.filter(t=>t!==tag);
  }else{
    selectedTags.push(tag);
  }
}

/* 記録 */
function add(){
  const text=document.getElementById('text').value;
  if(!text)return;

  entries.unshift({
    id:Date.now(),
    text,
    date:selectedDate,
    star:document.getElementById('starInput').checked,
    type:currentType,
    tags:[...selectedTags]
  });

  localStorage.setItem('data',JSON.stringify(entries));
  document.getElementById('text').value='';
  selectedTags=[];
  render();
}

/* 表示 */
function render(){
  const list=document.getElementById('list');

  let filtered = entries.filter(e=>e.date===selectedDate);
  if(starOnly) filtered = filtered.filter(e=>e.star);

  list.innerHTML = filtered.map(e=>`
    <div class="entry ${e.type}">
      <button class="delete-btn" onclick="deleteEntry(${e.id})">🗑</button>
      <span class="star" onclick="toggleStar(${e.id})">${e.star?'⭐':'☆'}</span>
      ${e.text}
      <div>${e.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function toggleStar(id){
  const item=entries.find(e=>e.id===id);
  item.star=!item.star;
  localStorage.setItem('data',JSON.stringify(entries));
  render();
}

function deleteEntry(id){
  entries = entries.filter(e=>e.id!==id);
  localStorage.setItem('data',JSON.stringify(entries));
  render();
}

function toggleStarFilter(){
  starOnly=!starOnly;
  render();
}

function prevMonth(){ current.setMonth(current.getMonth()-1); drawCalendar();}
function nextMonth(){ current.setMonth(current.getMonth()+1); drawCalendar();}

/* 初期 */
drawCalendar();
render();
renderTags();

/* Enter送信 */
document.getElementById('text').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    add();
  }
});
</script>

</body>
</html>
