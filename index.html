<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:10px;
  background:white;
  border-radius:8px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:10px;
}

.tag{
  display:inline-flex;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:3px;
}

.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}

textarea{
  flex:1;
  height:60px;
  border-radius:8px;
  border:1px solid #ccc;
  padding:10px;
}

.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #bfe8bf;
  border-radius:8px;
  position:relative;
}

.delete-btn{
  position:absolute;
  right:8px;
  top:8px;
  background:none;
}

.star{ cursor:pointer; }
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<div class="header">
  <button onclick="prevMonth()">◀</button>
  <div id="monthLabel"></div>
  <button onclick="nextMonth()">▶</button>
</div>

<div id="calendar" class="calendar"></div>

<div>
  <button class="type-btn" onclick="currentType='symptom'">症状</button>
  <button class="type-btn" onclick="currentType='memo'">薬</button>
</div>

<input id="tagInput" placeholder="タグ追加">
<button onclick="addTag()">追加</button>

<div id="tagList"></div>

<div class="input-area">
  <textarea id="text"></textarea>
  <button onclick="add()">送信</button>
</div>

<label><input type="checkbox" id="starInput"> ⭐重要</label>

<div id="list"></div>

<script>
var entries = JSON.parse(localStorage.getItem('data')||'[]');
var tags = JSON.parse(localStorage.getItem('tags')||'[]');

var selectedTags=[];
var currentType='symptom';
var current=new Date();
var selectedDate=formatDate(current);

function formatDate(d){
  return d.toISOString().slice(0,10);
}

function prevMonth(){
  current.setMonth(current.getMonth()-1);
  drawCalendar();
}
function nextMonth(){
  current.setMonth(current.getMonth()+1);
  drawCalendar();
}

function drawCalendar(){
  var cal=document.getElementById('calendar');
  cal.innerHTML='';

  var y=current.getFullYear();
  var m=current.getMonth();

  document.getElementById('monthLabel').innerText = y+"年 "+(m+1)+"月";

  var last=new Date(y,m+1,0).getDate();

  for(var i=1;i<=last;i++){
    var d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');
    var div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.innerText=i;

    div.onclick=(function(date){
      return function(){
        selectedDate=date;
        render();
        drawCalendar();
      }
    })(d);

    cal.appendChild(div);
  }
}

function addTag(){
  var val=document.getElementById('tagInput').value;
  if(!val)return;
  tags.push(val);
  saveAll();
  document.getElementById('tagInput').value='';
}

function renderTags(){
  var el=document.getElementById('tagList');
  el.innerHTML='';

  tags.forEach(function(t){
    var span=document.createElement('span');
    span.className='tag';

    var text=document.createElement('span');
    text.innerText=t;
    text.onclick=function(){ toggleTag(t); };

    var edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=function(){ renameTag(t); };

    var del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=function(){ deleteTag(t); };

    span.appendChild(text);
    span.appendChild(edit);
    span.appendChild(del);
    el.appendChild(span);
  });
}

function toggleTag(tag){
  if(selectedTags.includes(tag)){
    selectedTags=selectedTags.filter(function(t){return t!==tag});
  }else{
    selectedTags.push(tag);
  }
}

function renameTag(tag){
  var n=prompt("名前変更",tag);
  if(!n)return;

  tags=tags.map(function(t){return t===tag?n:t});

  entries.forEach(function(e){
    e.tags=e.tags.map(function(t){return t===tag?n:t});
  });

  saveAll();
}

function deleteTag(tag){
  if(!confirm("削除する？"))return;

  tags=tags.filter(function(t){return t!==tag});

  entries.forEach(function(e){
    e.tags=e.tags.filter(function(t){return t!==tag});
  });

  saveAll();
}

function add(){
  var text=document.getElementById('text').value;
  if(!text)return;

  var star=document.getElementById('starInput').checked;

  entries.unshift({
    id:Date.now(),
    text:text,
    date:selectedDate,
    star:star,
    type:currentType,
    tags:selectedTags.slice()
  });

  document.getElementById('text').value='';
  document.getElementById('starInput').checked=false;
  selectedTags=[];

  saveAll();
}

function toggleStar(id){
  var item=entries.find(function(e){return e.id===id});
  item.star=!item.star;
  saveAll();
}

function deleteEntry(id){
  entries=entries.filter(function(e){return e.id!==id});
  saveAll();
}

function render(){
  var list=document.getElementById('list');
  list.innerHTML='';

  var filtered=entries.filter(function(e){return e.date===selectedDate});

  filtered.forEach(function(e){
    var div=document.createElement('div');
    div.className='entry';

    var del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=function(){ deleteEntry(e.id); };

    var star=document.createElement('span');
    star.className='star';
    star.innerText=e.star?'⭐':'☆';
    star.onclick=function(){ toggleStar(e.id); };

    div.appendChild(del);
    div.appendChild(star);
    div.appendChild(document.createTextNode(" "+e.text));

    var tagDiv=document.createElement('div');
    e.tags.forEach(function(t){
      var tagSpan=document.createElement('span');
      tagSpan.className='tag';
      tagSpan.innerText=t;
      tagDiv.appendChild(tagSpan);
    });

    div.appendChild(tagDiv);
    list.appendChild(div);
  });
}

function saveAll(){
  localStorage.setItem('tags',JSON.stringify(tags));
  localStorage.setItem('data',JSON.stringify(entries));
  renderTags();
  render();
}

drawCalendar();
render();
renderTags();
</script>

</body>
</html>
