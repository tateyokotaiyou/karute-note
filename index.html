<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
*{ box-sizing:border-box; }

body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  padding-bottom:80px;
}

h2{ color:#6fbf73; }

button{
  border:none;
  border-radius:8px;
  padding:6px 10px;
  margin:2px;
  background:#dff5df;
}

.small-btn{
  font-size:10px;
  padding:2px 4px;
}

.type-btn{
  background:#eaf6fb;
  border:2px solid transparent;
}
.type-btn.active{
  border:2px solid #7ec8e3;
  background:#f0fbff;
}

.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:8px;
  background:white;
  border-radius:6px;
  text-align:center;
}

.day.active{ background:#bfe8bf; }

.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
  cursor:pointer;
}

.tag.selected{
  background:#cde7ff;
}

.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
}

.entry.memo{
  border-left:5px solid #f5c28b;
}

.meta{
  font-size:11px;
  color:#888;
}

textarea{
  width:100%;
  height:120px;
}

.small-title{
  font-size:13px;
  color:#444;
}

.tag-picker{
  display:none;
  background:#fff;
  padding:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<h2>カルテノート</h2>

<button id="backupBtn">📦 バックアップ</button><br>
<input type="file" id="fileInput"><br>
<button id="restoreBtn">復元</button>
<div id="backupInfo" class="meta"></div>

<hr>

<div class="nav">
<button id="prevYear">⏪</button>
<button id="prevMonth">◀</button>
<div id="monthLabel"></div>
<button id="nextMonth">▶</button>
<button id="nextYear">⏩</button>
</div>

<div id="calendar" class="calendar"></div>

<hr>

<button id="symptomBtn" class="type-btn active">🩺 症状</button>
<button id="memoBtn" class="type-btn">💊 薬</button>

<div>タグ</div>
<input id="tagInput">
<button id="addTagBtn">追加</button>
<div id="tagList"></div>

<div class="small-title">症状・その他メモ入力</div>
<textarea id="text"></textarea>
<button id="sendBtn">送信</button>

<div>
  <button id="allBtn" class="type-btn active">すべて</button>
  <button id="favBtn" class="type-btn">♡</button>
</div>

<div id="list"></div>

<script>
try{

const el=id=>document.getElementById(id);

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

entries = entries.map(e=>({...e,tags:e.tags||[]}));

let selectedTags=[];
let currentType='symptom';
let filterMode='all';

let current=new Date();
let selectedDate=formatDate(current);

function formatDate(d){
  return d.toISOString().slice(0,10);
}

/* UI */
function updateTypeUI(){
  el('symptomBtn').classList.toggle('active',currentType==='symptom');
  el('memoBtn').classList.toggle('active',currentType==='memo');
}

function updateFilterUI(){
  el('allBtn').classList.toggle('active',filterMode==='all');
  el('favBtn').classList.toggle('active',filterMode==='fav');
}

/* イベント */
el('symptomBtn').onclick=()=>{currentType='symptom';updateTypeUI();}
el('memoBtn').onclick=()=>{currentType='memo';updateTypeUI();}
el('allBtn').onclick=()=>{filterMode='all';updateFilterUI();render();}
el('favBtn').onclick=()=>{filterMode='fav';updateFilterUI();render();}

/* カレンダー */
function draw(){
  const cal=el('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();
  el('monthLabel').innerText=y+"年 "+(m+1)+"月";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.appendChild(document.createElement('div'));

  for(let i=1;i<=last;i++){
    const d=formatDate(new Date(y,m,i));
    const div=document.createElement('div');

    div.className='day';
    if(d===selectedDate) div.classList.add('active');

    div.innerText=i;
    div.onclick=()=>{selectedDate=d;draw();render();};

    cal.appendChild(div);
  }
}

el('prevMonth').onclick=()=>{current.setMonth(current.getMonth()-1);draw();}
el('nextMonth').onclick=()=>{current.setMonth(current.getMonth()+1);draw();}
el('prevYear').onclick=()=>{current.setFullYear(current.getFullYear()-1);draw();}
el('nextYear').onclick=()=>{current.setFullYear(current.getFullYear()+1);draw()}

/* タグ */
el('addTagBtn').onclick=()=>{
  const v=el('tagInput').value;
  if(!v)return;
  tags.push(v);
  el('tagInput').value='';
  save();
};

function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag'+(selectedTags.includes(t)?' selected':'');
    span.innerText=t;

    span.onclick=()=>{
      selectedTags.includes(t)
        ? selectedTags=selectedTags.filter(x=>x!==t)
        : selectedTags.push(t);
      renderTags();
    };

    area.appendChild(span);
  });
}

/* 投稿 */
el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    id:Date.now(),
    text:txt,
    date:selectedDate,
    tags:[...selectedTags],
    type:currentType,
    fav:false,
    createdAt:Date.now()
  });

  el('text').value='';
  selectedTags=[];
  save();
};

/* 表示 */
function render(){
  const list=el('list');
  list.innerHTML='';

  let arr=entries.filter(e=>e.date===selectedDate);
  if(filterMode==='fav') arr=arr.filter(e=>e.fav);

  arr.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry '+(e.type==='memo'?'memo':'');

    const meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=new Date(e.createdAt).toLocaleString();

    const heart=document.createElement('span');
    heart.innerText=e.fav?'🩵':'♡';
    heart.onclick=()=>{e.fav=!e.fav;save();};

    const text=document.createElement('div');
    text.innerText=e.text;

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=()=>{
      const t=prompt("修正",e.text);
      if(t!==null){ e.text=t; save(); }
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=()=>{
      if(!confirm("削除しますか？"))return;
      entries=entries.filter(x=>x.id!==e.id);
      save();
    };

    div.append(meta,heart,text,edit,del);

    const tagDiv=document.createElement('div');

    e.tags.forEach((t,i)=>{
      const wrap=document.createElement('span');
      wrap.className='tag';

      const label=document.createElement('span');
      label.innerText=t;

      const delTag=document.createElement('button');
      delTag.innerText='🗑';
      delTag.className='small-btn';
      delTag.onclick=()=>{
        if(!confirm("削除しますか？"))return;
        e.tags.splice(i,1);
        save();
      };

      wrap.append(label,delTag);
      tagDiv.appendChild(wrap);
    });

    const addBtn=document.createElement('button');
    addBtn.innerText='➕';

    const picker=document.createElement('div');
    picker.className='tag-picker';

    tags.forEach(t=>{
      const tBtn=document.createElement('span');
      tBtn.className='tag';
      tBtn.innerText=t;

      tBtn.onclick=()=>{
        if(!e.tags.includes(t)){
          e.tags.push(t);
          save();
        }
      };

      picker.appendChild(tBtn);
    });

    addBtn.onclick=()=>{
      picker.style.display =
        picker.style.display==='none'?'block':'none';
    };

    tagDiv.append(addBtn,picker);
    div.appendChild(tagDiv);

    list.appendChild(div);
  });
}

/* 保存 */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

/* バックアップ */
el('backupBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({entries,tags},null,2)]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup.json';
  a.click();

  localStorage.setItem('backupDate',Date.now());
  updateBackupInfo();
};

/* 復元 */
el('restoreBtn').onclick=()=>{
  const file=el('fileInput').files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=e=>{
    const d=JSON.parse(e.target.result);
    entries=d.entries||[];
    tags=d.tags||[];
    save();

    localStorage.setItem('backupDate',Date.now());
    updateBackupInfo();
  };
  reader.readAsText(file);
};

function updateBackupInfo(){
  const last=localStorage.getItem('backupDate');
  el('backupInfo').innerText=
    last ? "最終バックアップ："+new Date(Number(last)).toLocaleString()
         : "未バックアップ";
}

draw();
render();
renderTags();
updateTypeUI();
updateFilterUI();
updateBackupInfo();

}catch(e){
  document.body.innerHTML="<pre>"+e+"</pre>";
}
</script>

</body>
</html>
