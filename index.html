<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
}
h2{ color:#6fbf73; text-align:center; }

button{
  background:#dff5df;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

/* 余白追加 */
#toggleCal{
  margin-top:10px;
  margin-bottom:10px;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  padding:8px;
  background:white;
  border-radius:6px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}
.tag button{
  margin-left:4px;
  font-size:10px;
}
.tag.selected{
  background:#eaf6fb;
  border:2px solid #9ed0e6;
}

/* 投稿 */
.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}
.meta{ font-size:12px; color:#888; }

.edit-btn{ position:absolute; right:40px; top:6px; }
.delete-btn{ position:absolute; right:8px; top:6px; }

textarea{
  width:100%;
  height:140px;
  padding:10px;
  margin-top:6px;
}
.tag-picker{
  background:white;
  padding:6px;
  border-radius:8px;
  margin-top:4px;
}
</style>
</head>

<body>

<h2>カルテノート</h2>

<!-- バックアップ -->
<button id="backupBtn">📦 バックアップ</button><br>
<input type="file" id="fileInput"><br>
<button id="restoreBtn">復元</button>
<div id="backupInfo"></div>

<hr>

<button id="toggleCal">📅 カレンダー表示/非表示</button>

<div id="calendarWrap">
  <div style="display:flex; justify-content:space-between;">
    <button id="prevYear">⏪</button>
    <button id="prevMonth">◀</button>
    <span id="monthLabel"></span>
    <button id="nextMonth">▶</button>
    <button id="nextYear">⏩</button>
  </div>
  <div id="calendar" class="calendar"></div>
</div>

<hr>

<input id="tagInput">
<button id="addTagBtn">追加</button>
<div id="tagList"></div>

<textarea id="text"></textarea>
<button id="sendBtn">送信</button>

<div id="list"></div>

<script>
const el=id=>document.getElementById(id);

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let current=new Date();
let selectedDate=formatDate(current);

function formatDate(d){ return d.toISOString().slice(0,10); }

/* カレンダー */
function draw(){
  const cal=el('calendar');
  cal.innerHTML='';
  const y=current.getFullYear();
  const m=current.getMonth();
  el('monthLabel').innerText=y+"年 "+(m+1)+"月";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.appendChild(document.createElement('div'));

  for(let i=1;i<=last;i++){
    const d=formatDate(new Date(y,m,i));
    const div=document.createElement('div');
    div.className='day';
    if(d===selectedDate) div.classList.add('active');
    div.innerText=i;
    div.onclick=()=>{selectedDate=d;draw();render();};
    cal.appendChild(div);
  }
}

el('prevMonth').onclick=()=>{current.setMonth(current.getMonth()-1);draw();}
el('nextMonth').onclick=()=>{current.setMonth(current.getMonth()+1);draw();}
el('prevYear').onclick=()=>{current.setFullYear(current.getFullYear()-1);draw();}
el('nextYear').onclick=()=>{current.setFullYear(current.getFullYear()+1);draw();}

/* タグ */
function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach((t,i)=>{
    const span=document.createElement('span');
    span.className='tag'+(selectedTags.includes(t)?' selected':'');
    span.innerText=t;

    span.onclick=()=>{
      selectedTags.includes(t)
        ? selectedTags=selectedTags.filter(x=>x!==t)
        : selectedTags.push(t);
      renderTags();
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=(e)=>{
      e.stopPropagation();
      tags.splice(i,1);
      save();
    };

    span.appendChild(del);
    area.appendChild(span);
  });
}

/* 投稿 */
el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    id:Date.now(),
    text:txt,
    date:selectedDate,
    tags:[...selectedTags],
    createdAt:Date.now()
  });

  el('text').value='';
  selectedTags=[];
  save();
};

/* 表示 */
function render(){
  const list=el('list');
  list.innerHTML='';

  entries.filter(e=>e.date===selectedDate).forEach(e=>{
    const div=document.createElement('div');
    div.className='entry';

    const meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=new Date(e.createdAt).toLocaleString();

    const text=document.createElement('div');
    text.innerText=e.text;

    const tagDiv=document.createElement('div');

    (e.tags||[]).forEach(t=>{
      const span=document.createElement('span');
      span.className='tag';
      span.innerText=t;

      const del=document.createElement('button');
      del.innerText='🗑';
      del.onclick=()=>{
        e.tags=e.tags.filter(x=>x!==t);
        save();
      };

      tagDiv.append(span,del);
    });

    /* ➕タグ追加 */
    const addBtn=document.createElement('button');
    addBtn.innerText='➕';

    const picker=document.createElement('div');
    picker.className='tag-picker';
    picker.style.display='none';

    tags.forEach(t=>{
      const btn=document.createElement('span');
      btn.className='tag';
      btn.innerText=t;
      btn.onclick=()=>{
        if(!e.tags.includes(t)){
          e.tags.push(t);
          save();
        }
      };
      picker.appendChild(btn);
    });

    addBtn.onclick=()=>{
      picker.style.display = picker.style.display==='none'?'block':'none';
    };

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.className='edit-btn';
    edit.onclick=()=>{
      const t=prompt("修正",e.text);
      if(t!==null){ e.text=t; save(); }
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=()=>{
      if(confirm("削除する？")){
        entries=entries.filter(x=>x.id!==e.id);
        save();
      }
    };

    tagDiv.append(addBtn,picker);

    div.append(meta,text,tagDiv,edit,del);
    list.appendChild(div);
  });
}

/* 保存 */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

/* バックアップ */
el('backupBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({entries,tags})]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup.json';
  a.click();

  localStorage.setItem('backupDate',Date.now());
  updateBackupInfo();
};

el('restoreBtn').onclick=()=>{
  const file=el('fileInput').files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=e=>{
    const d=JSON.parse(e.target.result);
    entries=d.entries||[];
    tags=d.tags||[];
    save();
    localStorage.setItem('backupDate',Date.now());
    updateBackupInfo();
  };
  reader.readAsText(file);
};

function updateBackupInfo(){
  const last=localStorage.getItem('backupDate');
  el('backupInfo').innerText=
    last ? "最終："+new Date(Number(last)).toLocaleString() : "";
}

/* カレンダー開閉 */
let calOpen=true;
el('toggleCal').onclick=()=>{
  calOpen=!calOpen;
  el('calendarWrap').style.display=calOpen?'block':'none';
};

/* 初期化 */
draw();
render();
renderTags();
updateBackupInfo();

</script>

</body>
</html>
