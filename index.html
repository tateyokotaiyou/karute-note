<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

button.active-filter{
  background:#bfe8bf;
  font-weight:600;
}

.backup-info{ font-size:12px; color:#666; margin-top:6px; }
.small{ font-size:12px; }

.section-space{ margin-top:18px; }

.month-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:10px;
  background:white;
  border-radius:8px;
  text-align:center;
}

.sunday{
  border:2px solid #ff6b6b;
}

.day.active{ background:#bfe8bf; }

.week{
  font-size:12px;
  text-align:center;
  color:#888;
}

.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:12px;
}
.type-btn.active.symptom{ border-color:#8bbcf5; color:#4a90e2; }
.type-btn.active.memo{ border-color:#8fd694; color:#4caf50; }

.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:3px 7px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}

.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}
textarea{
  flex:1;
  height:60px;
}

.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}

.meta{ font-size:12px; color:#888; }

.heart{ font-size:18px; cursor:pointer; }
.heart.on{ color:#7ec8e3; }
.heart.off{ color:#bbb; }

.edit-btn{ position:absolute; right:40px; top:6px; background:none; }
.delete-btn{ position:absolute; right:8px; top:6px; background:none; }

</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<!-- バックアップ -->
<div>
<button onclick="exportData()">📦 バックアップ</button>

<label class="small">

<input type="file" id="importFile" accept=".json" onchange="showFileName()">
</label>

<div id="fileName" class="small"></div>
<button onclick="importData()">復元する</button>
<div id="backupInfo" class="backup-info"></div>
</div>

<div class="section-space"></div>

<!-- ナビ -->
<div class="month-nav">
<button onclick="changeYear(-1)">⏪</button>
<button onclick="changeMonth(-1)">◀</button>
<div id="monthLabel"></div>
<button onclick="changeMonth(1)">▶</button>
<button onclick="changeYear(1)">⏩</button>
</div>

<!-- 曜日 -->
<div class="calendar">
<div class="week">日</div><div class="week">月</div><div class="week">火</div>
<div class="week">水</div><div class="week">木</div><div class="week">金</div><div class="week">土</div>
</div>

<div id="calendar" class="calendar"></div>

<div class="section-space"></div>

<!-- タイプ -->
<div>
<button class="type-btn active symptom" onclick="setType('symptom',this)">🩺 症状</button>
<button class="type-btn memo" onclick="setType('memo',this)">💊 薬</button>
</div>

<!-- タグ -->
<input id="tagInput" placeholder="タグ追加">
<button onclick="addTag()">追加</button>
<div id="tagList"></div>

<!-- 入力 -->
<div class="input-area">
<textarea id="text"></textarea>
<button onclick="add()">送信</button>
</div>

<!-- フィルター -->
<div style="margin:10px 0;">
<button id="filterAll" onclick="setFilter('all')">すべて</button>
<button id="filterFav" onclick="setFilter('fav')">♡のみ</button>
</div>

<div id="list"></div>

<script>
let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let currentType='symptom';
let current=new Date();
let selectedDate=formatDate(current);
let currentFilter='all';

function formatDate(d){return d.toISOString().slice(0,10);}

function changeYear(diff){
  current.setFullYear(current.getFullYear()+diff);
  drawCalendar();
}
function changeMonth(diff){
  current.setMonth(current.getMonth()+diff);
  drawCalendar();
}

function drawCalendar(){
  const y=current.getFullYear();
  const m=current.getMonth();

  monthLabel.innerText=y+"年 "+(m+1)+"月";
  calendar.innerHTML='';

  const firstDay=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<firstDay;i++){
    calendar.appendChild(document.createElement('div'));
  }

  for(let i=1;i<=last;i++){
    const d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');

    const div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.innerText=i;

    if(new Date(y,m,i).getDay()===0){
      div.classList.add('sunday');
    }

    div.onclick=()=>{
      selectedDate=d;
      render();
      drawCalendar();
    };

    calendar.appendChild(div);
  }
}

/* 以下は元機能そのまま */
function setFilter(type){currentFilter=type;render();}
function setType(type,el){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function addTag(){if(!tagInput.value)return;tags.push(tagInput.value);tagInput.value='';saveAll();}
function renderTags(){tagList.innerHTML='';tags.forEach(t=>{
  const span=document.createElement('span');span.className='tag';span.innerText=t;tagList.appendChild(span);
});}

function add(){
  const text=document.getElementById('text').value;
  if(!text)return;
  entries.unshift({id:Date.now(),text,date:selectedDate,type:currentType,fav:false});
  document.getElementById('text').value='';
  saveAll();
}
