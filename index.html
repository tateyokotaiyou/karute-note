<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>カルテノート</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="カルテノート">
<meta name="application-name" content="カルテノート">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

/* 月ナビ */
.month-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

/* タイプ */
.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:12px;
}
.type-btn.active.symptom{
  border-color:#8bbcf5;
  color:#4a90e2;
}
.type-btn.active.memo{
  border-color:#8fd694;
  color:#4caf50;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-bottom:16px;
}
.day{
  padding:10px;
  background:white;
  border-radius:8px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:3px 7px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}
.tag.selected{
  background:#bfe8bf;
  font-weight:600;
}
.tag button{
  font-size:10px;
  margin-left:6px;
  opacity:0.6;
}

/* 入力 */
.input-area{
  display:flex;
  gap:8px;
}
textarea{
  flex:1;
  height:60px;
  border-radius:8px;
  border:1px solid #ccc;
  padding:10px;
}

/* 投稿 */
.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}
.entry.memo{
  border-left:5px solid #8fd694;
}

.meta{
  font-size:12px;
  color:#888;
}

.delete-btn{
  position:absolute;
  right:8px;
  top:8px;
  background:none;
}
.edit-btn{
  position:absolute;
  right:40px;
  top:8px;
  background:none;
}

/* 🩵 */
.heart{
  font-size:18px;
  margin-right:6px;
  cursor:pointer;
  transition:transform 0.15s ease;
}
.heart.off{ color:#bbb; }
.heart.on{
  color:#7ec8e3;
  transform:scale(1.25);
}
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<!-- 月表示 -->
<div class="month-nav">
  <button onclick="changeMonth(-1)">◀</button>
  <div id="monthLabel"></div>
  <button onclick="changeMonth(1)">▶</button>
</div>

<!-- カレンダー -->
<div id="calendar" class="calendar"></div>

<!-- タイプ -->
<div style="margin-bottom:12px;">
  <button class="type-btn active symptom" onclick="setType('symptom',this)">🩺 症状</button>
  <button class="type-btn memo" onclick="setType('memo',this)">💊 薬</button>
</div>

<!-- タグ -->
<input id="tagInput" placeholder="タグ追加">
<button onclick="addTag()">追加</button>
<div id="tagList"></div>

<!-- 入力 -->
<div class="input-area">
  <textarea id="text"></textarea>
  <button onclick="add()">送信</button>
</div>

<!-- フィルター -->
<div style="margin:12px 0;">
  <button onclick="setFilter('all')">すべて</button>
  <button onclick="setFilter('fav')">♡のみ</button>
</div>

<div id="list"></div>

<script>
var entries = JSON.parse(localStorage.getItem('data')||'[]');
var tags = JSON.parse(localStorage.getItem('tags')||'[]');

var selectedTags=[];
var currentType='symptom';
var current=new Date();
var selectedDate=formatDate(current);
var currentFilter='all';

function formatDate(d){
  return d.toISOString().slice(0,10);
}
function formatDateTime(ts){
  return new Date(ts).toLocaleString('ja-JP',{
    month:'numeric',
    day:'numeric',
    hour:'2-digit',
    minute:'2-digit'
  });
}

/* 月移動 */
function changeMonth(diff){
  current.setMonth(current.getMonth()+diff);
  drawCalendar();
}

/* カレンダー */
function drawCalendar(){
  var cal=document.getElementById('calendar');
  cal.innerHTML='';

  document.getElementById('monthLabel').innerText =
    current.getFullYear()+"年 "+(current.getMonth()+1)+"月";

  var y=current.getFullYear();
  var m=current.getMonth();
  var last=new Date(y,m+1,0).getDate();

  for(var i=1;i<=last;i++){
    var d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');
    var div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.innerText=i;
    div.onclick=(function(date){
      return function(){
        selectedDate=date;
        render();
        drawCalendar();
      }
    })(d);
    cal.appendChild(div);
  }
}

/* タイプ */
function setType(type,el){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

/* タグ */
function addTag(){
  var val=document.getElementById('tagInput').value;
  if(!val)return;
  tags.push(val);
  saveAll();
  document.getElementById('tagInput').value='';
}

function renderTags(){
  var el=document.getElementById('tagList');
  el.innerHTML='';
  tags.forEach(function(t){
    var span=document.createElement('span');
    span.className='tag';
    if(selectedTags.includes(t)) span.classList.add('selected');

    span.onclick=function(){
      toggleTag(t);
      renderTags();
    };

    span.innerText=t;
    el.appendChild(span);
  });
}

function toggleTag(tag){
  if(selectedTags.includes(tag)){
    selectedTags=selectedTags.filter(t=>t!==tag);
  }else{
    selectedTags.push(tag);
  }
}

/* 投稿 */
function add(){
  var text=document.getElementById('text').value;
  if(!text)return;

  entries.unshift({
    id:Date.now(),
    text:text,
    date:selectedDate,
    type:currentType,
    fav:false,
    tags:selectedTags.slice(),
    createdAt:Date.now()
  });

  document.getElementById('text').value='';
  selectedTags=[];
  saveAll();
}

/* 編集 */
function editEntry(id){
  var item=entries.find(e=>e.id===id);
  var newText=prompt("内容を修正しますか？", item.text);
  if(newText!==null){
    item.text=newText;
    saveAll();
  }
}

/* 削除 */
function deleteEntry(id){
  if(!confirm("この記録を削除しても大丈夫？")) return;
  entries = entries.filter(e=>e.id!==id);
  saveAll();
}

/* 🩵 */
function toggleFav(id){
  var item=entries.find(e=>e.id===id);
  item.fav=!item.fav;
  saveAll();
}

/* フィルター */
function setFilter(type){
  currentFilter=type;
  render();
}

/* 表示 */
function render(){
  var list=document.getElementById('list');
  list.innerHTML='';

  var filtered=entries.filter(e=>e.date===selectedDate);
  if(currentFilter==='fav'){
    filtered=filtered.filter(e=>e.fav);
  }

  filtered.forEach(function(e){
    var div=document.createElement('div');
    div.className='entry '+e.type;

    var heart=document.createElement('span');
    heart.className='heart '+(e.fav?'on':'off');
    heart.innerText=e.fav?'🩵':'♡';
    heart.onclick=function(){ toggleFav(e.id); };

    var meta=document.createElement('div');
    meta.className='meta';
    meta.innerText="🕒 "+formatDateTime(e.createdAt);

    var text=document.createElement('div');
    text.innerText=e.text;

    var del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=function(){ deleteEntry(e.id); };

    var edit=document.createElement('button');
    edit.innerText='✏️';
    edit.className='edit-btn';
    edit.onclick=function(){ editEntry(e.id); };

    div.appendChild(del);
    div.appendChild(edit);
    div.appendChild(heart);
    div.appendChild(meta);
    div.appendChild(text);

    var tagDiv=document.createElement('div');
    e.tags.forEach(function(t){
      var span=document.createElement('span');
      span.className='tag';
      span.innerText=t;
      tagDiv.appendChild(span);
    });

    div.appendChild(tagDiv);
    list.appendChild(div);
  });
}

function saveAll(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

drawCalendar();
render();
renderTags();
</script>

</body>
</html>
