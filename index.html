<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
}

button{
  background:#dff5df;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:8px;
  background:white;
  border-radius:6px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }
.sunday{ border:2px solid #ff8a8a; }

.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
  border:2px solid transparent;
  cursor:pointer;
}

.tag.selected{
  background:#eaf6fb;
  border:2px solid #9ed0e6;
}

.tag button{
  margin-left:5px;
  font-size:10px;
}

.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}

.edit-btn{ position:absolute; right:40px; top:6px; }
.delete-btn{ position:absolute; right:8px; top:6px; }

.meta{ font-size:12px; color:#888; }

.small{ font-size:12px; color:#666; }
</style>
</head>

<body>

<h2>カルテノート</h2>

<button id="backupBtn">📦 バックアップ</button><br>
<input type="file" id="fileInput"><br>
<button id="restoreBtn">復元</button>
<div id="backupInfo" class="small"></div>

<hr>

<div id="calendar" class="calendar"></div>

<hr>

<!-- タグ入力 -->
<input id="tagInput">
<button id="addTagBtn">追加</button>

<div id="tagList"></div>

<textarea id="text"></textarea>
<button id="sendBtn">送信</button>

<div>
<button id="allBtn">すべて</button>
<button id="favBtn">♡のみ</button>
</div>

<div class="small">タグ検索🔍</div>
<div id="tagFilterArea"></div>

<div id="list"></div>

<script>
try{

const el=id=>document.getElementById(id);

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let selectedDate=new Date().toISOString().slice(0,10);
let currentFilter='all';
let activeTagFilter=null;

/* カレンダー */
function draw(){
  const cal=el('calendar');
  cal.innerHTML='';

  for(let i=1;i<=31;i++){
    const d="2024-01-"+String(i).padStart(2,'0');
    const div=document.createElement('div');
    div.className='day';
    if(i%7===1) div.classList.add('sunday');

    if(d===selectedDate) div.classList.add('active');

    div.innerText=i;
    div.onclick=()=>{selectedDate=d;draw();render();};

    cal.appendChild(div);
  }
}

/* タグ一覧 */
function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag'+(selectedTags.includes(t)?' selected':'');

    span.innerText=t;

    span.onclick=()=>{
      selectedTags.includes(t)
      ? selectedTags=selectedTags.filter(x=>x!==t)
      : selectedTags.push(t);
      renderTags();
    };

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=(e)=>{
      e.stopPropagation();
      const n=prompt("変更",t);
      if(!n)return;
      tags=tags.map(x=>x===t?n:x);
      entries.forEach(e=>e.tags=e.tags?.map(x=>x===t?n:x));
      save();
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=(e)=>{
      e.stopPropagation();
      if(!confirm("削除する？"))return;
      tags=tags.filter(x=>x!==t);
      entries.forEach(e=>e.tags=e.tags?.filter(x=>x!==t));
      save();
    };

    span.append(edit,del);
    area.appendChild(span);
  });
}

/* タグ検索 */
function renderTagFilter(){
  const area=el('tagFilterArea');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag'+(activeTagFilter===t?' selected':'');

    span.innerText=t;

    span.onclick=()=>{
      activeTagFilter=activeTagFilter===t?null:t;
      renderTagFilter();
      render();
    };

    area.appendChild(span);
  });
}

/* 投稿 */
el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    id:Date.now(),
    text:txt,
    date:selectedDate,
    tags:[...selectedTags],
    createdAt:Date.now()
  });

  el('text').value='';
  selectedTags=[];
  save();
};

/* ⭐ 投稿編集（タグUI使う） */
function editEntry(e){
  const t=prompt("修正",e.text);
  if(t===null)return;

  selectedTags=[...(e.tags||[])];
  renderTags();

  alert("タグを選び直してから送信してください");

  el('text').value=t;

  // 一旦削除
  entries=entries.filter(x=>x.id!==e.id);
}

/* 表示 */
function render(){
  const list=el('list');
  list.innerHTML='';

  let arr=entries.filter(e=>e.date===selectedDate);
  if(activeTagFilter) arr=arr.filter(e=>e.tags?.includes(activeTagFilter));

  arr.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry';

    const meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=new Date(e.createdAt).toLocaleString();

    const text=document.createElement('div');
    text.innerText=e.text;

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.className='edit-btn';
    edit.onclick=()=>editEntry(e);

    const del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=()=>{
      if(confirm("削除する？")){
        entries=entries.filter(x=>x.id!==e.id);
        save();
      }
    };

    div.append(meta,text,edit,del);

    if(e.tags){
      const tagDiv=document.createElement('div');
      e.tags.forEach(t=>{
        const span=document.createElement('span');
        span.className='tag';
        span.innerText=t;
        tagDiv.appendChild(span);
      });
      div.appendChild(tagDiv);
    }

    list.appendChild(div);
  });
}

/* 保存 */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
  renderTagFilter();
}

/* タグ追加 */
el('addTagBtn').onclick=()=>{
  const v=el('tagInput').value;
  if(!v)return;
  tags.push(v);
  el('tagInput').value='';
  save();
};

/* 初期 */
draw();
render();
renderTags();
renderTagFilter();

}catch(e){
  document.body.innerHTML="<pre>"+e+"</pre>";
}
</script>

</body>
</html>
