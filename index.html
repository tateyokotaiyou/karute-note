<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

.section-space{ margin-top:18px; }

.month-nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:10px;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.week{
  font-size:12px;
  text-align:center;
  color:#888;
}

.day{
  padding:10px;
  background:white;
  border-radius:8px;
  text-align:center;
}

.sunday{ border:2px solid #ff6b6b; }
.day.active{ background:#bfe8bf; }

/* タイプ */
.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:12px;
}
.type-btn.active.symptom{ border-color:#8bbcf5; }
.type-btn.active.memo{ border-color:#8fd694; }

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:3px 7px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}
.tag button{
  margin-left:5px;
  font-size:10px;
}

/* 入力 */
.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}
textarea{
  flex:1;
  height:60px;
}

/* 投稿 */
.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}

.meta{ font-size:12px; color:#888; }

.heart{ cursor:pointer; font-size:18px; }
.heart.on{ color:#7ec8e3; }

.edit-btn{ position:absolute; right:40px; top:6px; }
.delete-btn{ position:absolute; right:8px; top:6px; }

.active-filter{
  background:#bfe8bf;
}
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<!-- バックアップ -->
<button onclick="exportData()">📦 バックアップ</button>
<input type="file" id="importFile">

<div class="section-space"></div>

<!-- カレンダー -->
<div class="month-nav">
<button onclick="changeYear(-1)">⏪</button>
<button onclick="changeMonth(-1)">◀</button>
<div id="monthLabel"></div>
<button onclick="changeMonth(1)">▶</button>
<button onclick="changeYear(1)">⏩</button>
</div>

<div class="calendar">
<div class="week">日</div><div class="week">月</div><div class="week">火</div>
<div class="week">水</div><div class="week">木</div><div class="week">金</div><div class="week">土</div>
</div>

<div id="calendar" class="calendar"></div>

<div class="section-space"></div>

<!-- タイプ -->
<button class="type-btn active symptom" onclick="setType('symptom',this)">🩺 症状</button>
<button class="type-btn memo" onclick="setType('memo',this)">💊 薬</button>

<!-- タグ -->
<div>
<input id="tagInput" placeholder="タグ追加">
<button onclick="addTag()">追加</button>
</div>
<div id="tagList"></div>

<!-- 入力 -->
<div class="input-area">
<textarea id="text"></textarea>
<button onclick="add()">送信</button>
</div>

<!-- フィルター -->
<div>
<button id="filterAll">すべて</button>
<button id="filterFav">♡のみ</button>
</div>

<div id="list"></div>

<script>
try{

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedDate=new Date().toISOString().slice(0,10);
let current=new Date();
let currentType='symptom';
let currentFilter='all';

/* DOM安全取得 */
function el(id){return document.getElementById(id);}

/* カレンダー */
function draw(){
  const y=current.getFullYear();
  const m=current.getMonth();
  el('monthLabel').innerText=y+"年 "+(m+1)+"月";

  const cal=el('calendar');
  cal.innerHTML='';

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.appendChild(document.createElement('div'));

  for(let i=1;i<=last;i++){
    const d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');

    const div=document.createElement('div');
    div.className='day';
    if(d===selectedDate) div.classList.add('active');
    if(new Date(y,m,i).getDay()===0) div.classList.add('sunday');

    div.innerText=i;
    div.onclick=()=>{selectedDate=d;draw();render();};

    cal.appendChild(div);
  }
}

function changeMonth(d){current.setMonth(current.getMonth()+d);draw();}
function changeYear(d){current.setFullYear(current.getFullYear()+d);draw();}

/* タグ */
function addTag(){
  const val=el('tagInput').value;
  if(!val)return;
  tags.push(val);
  el('tagInput').value='';
  save();
}

function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag';
    span.innerText=t;

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=()=>{tags=tags.filter(x=>x!==t);save();};

    span.appendChild(del);
    area.appendChild(span);
  });
}

/* 投稿 */
function add(){
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    id:Date.now(),
    text:txt,
    date:selectedDate,
    fav:false,
    createdAt:Date.now()
  });

  el('text').value='';
  save();
}

/* 表示 */
function render(){
  const list=el('list');
  list.innerHTML='';

  let arr=entries.filter(e=>e.date===selectedDate);
  if(currentFilter==='fav') arr=arr.filter(e=>e.fav);

  arr.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry';

    const heart=document.createElement('span');
    heart.className='heart '+(e.fav?'on':'');
    heart.innerText=e.fav?'🩵':'♡';
    heart.onclick=()=>{e.fav=!e.fav;save();};

    const meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=new Date(e.createdAt).toLocaleString();

    const text=document.createElement('div');
    text.innerText=e.text;

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.className='edit-btn';
    edit.onclick=()=>{e.text=prompt("修正",e.text)||e.text;save();};

    const del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=()=>{if(confirm("削除する？")){entries=entries.filter(x=>x.id!==e.id);save();}};

    div.append(heart,meta,text,edit,del);
    list.appendChild(div);
  });
}

/* フィルター */
el('filterAll').onclick=()=>{currentFilter='all';render();};
el('filterFav').onclick=()=>{currentFilter='fav';render();};

/* 保存 */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

/* バックアップ */
function exportData(){
  const blob=new Blob([JSON.stringify({entries,tags})]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();
}

el('importFile').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=ev=>{
    const d=JSON.parse(ev.target.result);
    entries=d.entries||[];
    tags=d.tags||[];
    save();
  };
  reader.readAsText(file);
});

/* 初期 */
draw();
render();
renderTags();

}catch(e){
  document.body.innerHTML="<h2>エラーが発生しました</h2><pre>"+e+"</pre>";
}
</script>

</body>
</html>
