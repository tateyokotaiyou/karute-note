<!-- ★タグ表示部分だけでもOK、でも全替え推奨 -->

<script>

/* ⭐バグ修正 */
function add(){
  const text=document.getElementById('text').value;
  if(!text)return;

  const star = !!document.getElementById('starInput').checked;

  entries.unshift({
    id:Date.now(),
    text,
    date:selectedDate,
    star:star, // ←ここ完全修正
    type:currentType,
    tags:[...selectedTags]
  });

  localStorage.setItem('data',JSON.stringify(entries));

  document.getElementById('text').value='';
  document.getElementById('starInput').checked=false;
  selectedTags=[];
  renderTags();
  render();
}

/* 🏷 タグ表示（ボタン付き） */
function renderTags(){
  const el=document.getElementById('tagList');

  el.innerHTML=tags.map(t=>`
    <span class="tag ${selectedTags.includes(t)?'active':''}">
      <span onclick="toggleTag('${t}')">${t}</span>

      <!-- 編集 -->
      <button onclick="renameTag('${t}')" style="margin-left:4px;">✏️</button>

      <!-- 削除 -->
      <button onclick="deleteTag('${t}')">🗑</button>
    </span>
  `).join('');
}

/* ✏️ 名前変更 */
function renameTag(tag){
  const newName=prompt("タグ名変更",tag);
  if(!newName)return;

  tags = tags.map(t=>t===tag?newName:t);

  // entries内も変更
  entries.forEach(e=>{
    e.tags = e.tags.map(t=>t===tag?newName:t);
  });

  saveAll();
}

/* 🗑 削除 */
function deleteTag(tag){
  if(!confirm("タグ削除する？"))return;

  tags = tags.filter(t=>t!==tag);

  // entriesからも削除
  entries.forEach(e=>{
    e.tags = e.tags.filter(t=>t!==tag);
  });

  saveAll();
}

/* 保存まとめ */
function saveAll(){
  localStorage.setItem('tags',JSON.stringify(tags));
  localStorage.setItem('data',JSON.stringify(entries));
  renderTags();
  render();
}

</script>
