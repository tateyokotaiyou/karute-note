<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
}
h2{ color:#6fbf73; text-align:center; }

button{
  background:#dff5df;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

#sendBtn{
  display:block;
  width:100%;
  font-size:16px;
  padding:12px;
  margin-top:8px;
}

#filterRow{
  display:flex;
  gap:8px;
  margin-top:12px;
  flex-wrap:wrap;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  padding:8px;
  background:white;
  border-radius:6px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}
.tag button{
  margin-left:4px;
  font-size:10px;
}

/* 投稿 */
.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
}
.entry.memo{ border-left:5px solid #9edfb5; }

.type-active{
  border:2px solid #8fd3c7;
  background:#e8f7f3;
}
</style>
</head>

<body>

<h2>カルテノート</h2>

<button id="toggleCal">📅 カレンダー表示/非表示</button>

<div id="calendarWrap">
  <div>
    <button id="prevMonth">◀</button>
    <span id="monthLabel"></span>
    <button id="nextMonth">▶</button>
  </div>
  <div id="calendar" class="calendar"></div>
</div>

<hr>

<button id="symptomBtn">🩺 症状</button>
<button id="memoBtn">💊 薬</button>

<div>
<input id="tagInput">
<button id="addTagBtn">追加</button>
<div id="tagList"></div>
</div>

<textarea id="text"></textarea>
<button id="sendBtn">送信</button>

<div id="filterRow">
  <button id="allBtn">すべて</button>
  <button id="favBtn">♡のみ</button>
  <button id="symptomFilterBtn">🩺 症状</button>
  <button id="memoFilterBtn">💊 薬</button>
</div>

<div id="tagFilterArea"></div>

<div id="list"></div>

<script>
const el=id=>document.getElementById(id);

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let currentType='symptom';
let activeTagFilter=null;

let current=new Date();
let selectedDate=formatDate(current);

function formatDate(d){
  return d.toISOString().slice(0,10);
}

/* タイプ切替 */
function updateTypeUI(){
  el('symptomBtn').classList.toggle('type-active',currentType==='symptom');
  el('memoBtn').classList.toggle('type-active',currentType==='memo');
}
el('symptomBtn').onclick=()=>{currentType='symptom';updateTypeUI();}
el('memoBtn').onclick=()=>{currentType='memo';updateTypeUI();}

/* カレンダー */
function draw(){
  const cal=el('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();
  el('monthLabel').innerText=y+"年 "+(m+1)+"月";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.appendChild(document.createElement('div'));

  for(let i=1;i<=last;i++){
    const d=formatDate(new Date(y,m,i));
    const div=document.createElement('div');
    div.className='day';
    if(d===selectedDate) div.classList.add('active');

    div.innerText=i;
    div.onclick=()=>{selectedDate=d;draw();render();};

    cal.appendChild(div);
  }
}

el('prevMonth').onclick=()=>{current.setMonth(current.getMonth()-1);draw();}
el('nextMonth').onclick=()=>{current.setMonth(current.getMonth()+1);draw();}

/* タグ表示（削除ボタン付き） */
function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach((t,i)=>{
    const span=document.createElement('span');
    span.className='tag';
    span.innerText=t;

    span.onclick=()=>{
      selectedTags.includes(t)
        ? selectedTags=selectedTags.filter(x=>x!==t)
        : selectedTags.push(t);
      renderTags();
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=(e)=>{
      e.stopPropagation();
      tags.splice(i,1);
      save();
    };

    span.appendChild(del);
    area.appendChild(span);
  });
}

/* タグフィルタ */
function renderTagFilter(){
  const area=el('tagFilterArea');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag';
    span.innerText=t;

    span.onclick=()=>{
      activeTagFilter = activeTagFilter===t ? null : t;
      renderTagFilter();
      render();
    };

    area.appendChild(span);
  });
}

/* タグ追加 */
el('addTagBtn').onclick=()=>{
  const v=el('tagInput').value;
  if(!v)return;
  tags.push(v);
  el('tagInput').value='';
  save();
};

/* 投稿 */
el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    text:txt,
    date:selectedDate,
    tags:[...selectedTags],
    type:currentType,
    fav:false
  });

  el('text').value='';
  selectedTags=[];
  save();
};

/* 表示 */
let filterMode='all';
let typeFilter=null;

el('allBtn').onclick=()=>{filterMode='all';typeFilter=null;render();}
el('favBtn').onclick=()=>{filterMode='fav';typeFilter=null;render();}
el('symptomFilterBtn').onclick=()=>{typeFilter='symptom';render();}
el('memoFilterBtn').onclick=()=>{typeFilter='memo';render();}

function render(){
  const list=el('list');
  list.innerHTML='';

  let arr=entries.filter(e=>e.date===selectedDate);

  if(typeFilter) arr=arr.filter(e=>e.type===typeFilter);
  if(activeTagFilter) arr=arr.filter(e=>e.tags?.includes(activeTagFilter));
  if(filterMode==='fav') arr=arr.filter(e=>e.fav);

  arr.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry '+(e.type==='memo'?'memo':'');
    div.innerText=e.text;
    list.appendChild(div);
  });
}

/* 保存（タグ修正済） */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
  renderTagFilter();
}

/* カレンダー開閉 */
let calOpen=true;
el('toggleCal').onclick=()=>{
  calOpen=!calOpen;
  el('calendarWrap').style.display=calOpen?'block':'none';
};

/* 初期化 */
draw();
render();
renderTags();
renderTagFilter();
updateTypeUI();

</script>

</body>
</html>
