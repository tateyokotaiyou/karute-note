<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

/* 月 */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day{
  padding:10px;
  background:white;
  border-radius:8px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

/* タイプ */
.type-area{
  margin-top:12px;
}
.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:10px;
}
.type-btn.active.symptom{
  border-color:#a3c9f9;
  color:#4a90e2;
}
.type-btn.active.memo{
  border-color:#a8e6a3;
  color:#4caf50;
}

/* タグ */
.tag{
  display:inline-block;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:2px;
  cursor:pointer;
}
.tag.active{ background:#bfe8bf; }

/* 入力 */
.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}
textarea{
  flex:1;
  height:60px;
  border-radius:8px;
  border:1px solid #ccc;
  padding:10px;
}

/* 投稿 */
.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #bfe8bf;
  border-radius:8px;
  position:relative;
}
.entry.memo{ border-color:#a8e6a3; }

.delete-btn{
  position:absolute;
  right:8px;
  top:8px;
  background:none;
}
.star{ cursor:pointer; }
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<!-- 月 -->
<div class="header">
  <button onclick="prevMonth()">◀</button>
  <div id="monthLabel"></div>
  <button onclick="nextMonth()">▶</button>
</div>

<div id="calendar" class="calendar"></div>

<!-- タイプ -->
<div class="type-area">
  <button class="type-btn active symptom" onclick="setType('symptom',this)">症状</button>
  <button class="type-btn memo" onclick="setType('memo',this)">薬</button>
</div>

<!-- タグ -->
<div style="margin-top:10px;">
  <input id="tagInput" placeholder="タグ追加">
  <button onclick="addTag()">追加</button>
</div>

<div id="tagList"></div>

<!-- 入力 -->
<div class="input-area">
  <textarea id="text"></textarea>
  <button onclick="add()">送信</button>
</div>

<label><input type="checkbox" id="starInput"> ⭐重要</label>

<div id="list"></div>

<script>
let entries = JSON.parse(localStorage.getItem('data')||'[]');
let tags = JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let currentType='symptom';
let current=new Date();
let selectedDate=formatDate(current);

function formatDate(d){
  return d.toISOString().slice(0,10);
}

/* 月移動 */
function prevMonth(){ current.setMonth(current.getMonth()-1); drawCalendar();}
function nextMonth(){ current.setMonth(current.getMonth()+1); drawCalendar();}

/* カレンダー */
function drawCalendar(){
  const cal=document.getElementById('calendar');
  cal.innerHTML='';
  const y=current.getFullYear();
  const m=current.getMonth();

  document.getElementById('monthLabel').textContent=`${y}年 ${m+1}月`;

  const last=new Date(y,m+1,0).getDate();

  for(let i=1;i<=last;i++){
    const d=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
    const div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.textContent=i;
    div.onclick=()=>{selectedDate=d;render();drawCalendar()};
    cal.appendChild(div);
  }
}

/* タイプ */
function setType(type,el){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

/* タグ */
function addTag(){
  const val=document.getElementById('tagInput').value.trim();
  if(!val)return;
  tags.push(val);
  saveTags();
  document.getElementById('tagInput').value='';
  renderTags();
}

function saveTags(){
  localStorage.setItem('tags',JSON.stringify(tags));
}

/* タグ表示＋編集 */
function renderTags(){
  const el=document.getElementById('tagList');
  el.innerHTML=tags.map(t=>`
    <span class="tag ${selectedTags.includes(t)?'active':''}"
      onclick="toggleTag('${t}')"
      oncontextmenu="editTag(event,'${t}')"
      ontouchstart="startPress(event,'${t}')"
      ontouchend="cancelPress()">
      ${t}
    </span>
  `).join('');
}

function toggleTag(tag){
  if(selectedTags.includes(tag)){
    selectedTags=selectedTags.filter(t=>t!==tag);
  }else{
    selectedTags.push(tag);
  }
  renderTags();
}

/* 長押し削除 */
let pressTimer;
function startPress(e,tag){
  pressTimer=setTimeout(()=>{
    if(confirm("タグ削除？")){
      tags=tags.filter(t=>t!==tag);
      saveTags();
      renderTags();
    }
  },600);
}
function cancelPress(){ clearTimeout(pressTimer); }

/* 名前変更 */
function editTag(e,tag){
  e.preventDefault();
  const n=prompt("名前変更",tag);
  if(n){
    tags=tags.map(t=>t===tag?n:t);
    saveTags();
    renderTags();
  }
}

/* 投稿 */
function add(){
  const text=document.getElementById('text').value;
  if(!text)return;

  const star = document.getElementById('starInput').checked;

  entries.unshift({
    id:Date.now(),
    text,
    date:selectedDate,
    star:star, /* ←ここ修正済み */
    type:currentType,
    tags:[...selectedTags]
  });

  localStorage.setItem('data',JSON.stringify(entries));

  document.getElementById('text').value='';
  document.getElementById('starInput').checked=false;
  selectedTags=[];
  renderTags();
  render();
}

/* ⭐ */
function toggleStar(id){
  const item=entries.find(e=>e.id===id);
  item.star=!item.star;
  localStorage.setItem('data',JSON.stringify(entries));
  render();
}

/* 削除 */
function deleteEntry(id){
  entries=entries.filter(e=>e.id!==id);
  localStorage.setItem('data',JSON.stringify(entries));
  render();
}

/* 表示 */
function render(){
  const list=document.getElementById('list');

  let filtered=entries.filter(e=>e.date===selectedDate);

  list.innerHTML=filtered.map(e=>`
    <div class="entry ${e.type}">
      <button class="delete-btn" onclick="deleteEntry(${e.id})">🗑</button>
      <span class="star" onclick="toggleStar(${e.id})">${e.star?'⭐':'☆'}</span>
      ${e.text}
      <div>
        ${e.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

drawCalendar();
render();
renderTags();
</script>

</body>
</html>
