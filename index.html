<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カルテノート</title>

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
}

h2{ color:#6fbf73; text-align:center; }

button{
  background:#dff5df;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

#sendBtn{
  display:block;
  width:100%;
  font-size:16px;
  padding:14px;
  margin-top:10px;
}

#filterRow{
  display:flex;
  gap:8px;
  margin-top:12px;
  flex-wrap:wrap;
}

/* カレンダー */
.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}
.day{
  padding:8px;
  background:white;
  border-radius:6px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

.nav{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

/* タグ */
.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:4px 8px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}
.tag button{
  margin-left:4px;
  font-size:10px;
}

/* 投稿 */
.entry{
  background:white;
  margin-top:10px;
  padding:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}
.entry.memo{ border-left:5px solid #9edfb5; }

.meta{ font-size:12px; color:#888; }

textarea{
  width:100%;
  height:140px;
  padding:8px;
  margin-top:6px;
}
</style>
</head>

<body>

<h2>カルテノート</h2>

<!-- バックアップ -->
<button id="backupBtn">📦 バックアップ</button><br>
<input type="file" id="fileInput"><br>
<button id="restoreBtn">復元</button>
<div id="backupInfo"></div>

<hr>

<button id="toggleCal">📅 カレンダー表示/非表示</button>

<div id="calendarWrap">
  <div class="nav">
    <button id="prevYear">⏪</button>
    <button id="prevMonth">◀</button>
    <div id="monthLabel"></div>
    <button id="nextMonth">▶</button>
    <button id="nextYear">⏩</button>
  </div>
  <div id="calendar" class="calendar"></div>
</div>

<hr>

<button id="symptomBtn">🩺 症状</button>
<button id="memoBtn">💊 薬</button>

<div>
<input id="tagInput">
<button id="addTagBtn">追加</button>
<div id="tagList"></div>
</div>

<textarea id="text"></textarea>
<button id="sendBtn">送信</button>

<div id="filterRow">
  <button id="allBtn">すべて</button>
  <button id="favBtn">♡のみ</button>
  <button id="symptomFilterBtn">🩺 症状</button>
  <button id="memoFilterBtn">💊 薬</button>
</div>

<div>タグ検索🔍</div>
<div id="tagFilterArea"></div>

<div id="list"></div>

<script>
const el=id=>document.getElementById(id);

let entries=JSON.parse(localStorage.getItem('data')||'[]');
let tags=JSON.parse(localStorage.getItem('tags')||'[]');

let selectedTags=[];
let currentType='symptom';
let activeTagFilter=null;

let filterMode='all';
let typeFilter=null;

let current=new Date();
let selectedDate=formatDate(current);

function formatDate(d){
  return d.toISOString().slice(0,10);
}

/* タイプ */
el('symptomBtn').onclick=()=>currentType='symptom';
el('memoBtn').onclick=()=>currentType='memo';

/* カレンダー */
function draw(){
  const cal=el('calendar');
  cal.innerHTML='';

  const y=current.getFullYear();
  const m=current.getMonth();
  el('monthLabel').innerText=y+"年 "+(m+1)+"月";

  const first=new Date(y,m,1).getDay();
  const last=new Date(y,m+1,0).getDate();

  for(let i=0;i<first;i++) cal.appendChild(document.createElement('div'));

  for(let i=1;i<=last;i++){
    const d=formatDate(new Date(y,m,i));
    const div=document.createElement('div');
    div.className='day';
    if(d===selectedDate) div.classList.add('active');

    div.innerText=i;
    div.onclick=()=>{selectedDate=d;draw();render();};

    cal.appendChild(div);
  }
}

el('prevMonth').onclick=()=>{current.setMonth(current.getMonth()-1);draw();}
el('nextMonth').onclick=()=>{current.setMonth(current.getMonth()+1);draw();}
el('prevYear').onclick=()=>{current.setFullYear(current.getFullYear()-1);draw();}
el('nextYear').onclick=()=>{current.setFullYear(current.getFullYear()+1);draw()}

/* タグ */
function renderTags(){
  const area=el('tagList');
  area.innerHTML='';

  tags.forEach((t,i)=>{
    const span=document.createElement('span');
    span.className='tag';
    span.innerText=t;

    span.onclick=()=>{
      selectedTags.includes(t)
        ? selectedTags=selectedTags.filter(x=>x!==t)
        : selectedTags.push(t);
      renderTags();
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=(e)=>{
      e.stopPropagation();
      tags.splice(i,1);
      save();
    };

    span.appendChild(del);
    area.appendChild(span);
  });
}

el('addTagBtn').onclick=()=>{
  const v=el('tagInput').value;
  if(!v)return;
  tags.push(v);
  el('tagInput').value='';
  save();
};

/* 投稿 */
el('sendBtn').onclick=()=>{
  const txt=el('text').value;
  if(!txt)return;

  entries.unshift({
    id:Date.now(),
    text:txt,
    date:selectedDate,
    tags:[...selectedTags],
    type:currentType,
    fav:false,
    createdAt:Date.now()
  });

  el('text').value='';
  selectedTags=[];
  save();
};

/* フィルタ */
el('allBtn').onclick=()=>{filterMode='all';typeFilter=null;render();}
el('favBtn').onclick=()=>{filterMode='fav';typeFilter=null;render();}
el('symptomFilterBtn').onclick=()=>{typeFilter='symptom';render();}
el('memoFilterBtn').onclick=()=>{typeFilter='memo';render();}

/* 表示 */
function render(){
  const list=el('list');
  list.innerHTML='';

  let arr=entries.filter(e=>e.date===selectedDate);

  if(typeFilter) arr=arr.filter(e=>e.type===typeFilter);
  if(activeTagFilter) arr=arr.filter(e=>e.tags?.includes(activeTagFilter));
  if(filterMode==='fav') arr=arr.filter(e=>e.fav);

  arr.forEach(e=>{
    const div=document.createElement('div');
    div.className='entry '+(e.type==='memo'?'memo':'');

    const meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=new Date(e.createdAt).toLocaleString();

    const text=document.createElement('div');
    text.innerText=e.text;

    const edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=()=>{
      const t=prompt("修正",e.text);
      if(t!==null){ e.text=t; save(); }
    };

    const del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=()=>{
      if(confirm("削除する？")){
        entries=entries.filter(x=>x.id!==e.id);
        save();
      }
    };

    div.append(meta,text,edit,del);

    /* 投稿タグ */
    const tagDiv=document.createElement('div');

    (e.tags||[]).forEach(t=>{
      const span=document.createElement('span');
      span.className='tag';
      span.innerText=t;

      const delBtn=document.createElement('button');
      delBtn.innerText='🗑';
      delBtn.onclick=()=>{
        e.tags=e.tags.filter(x=>x!==t);
        save();
      };

      tagDiv.append(span,delBtn);
    });

    const addBtn=document.createElement('button');
    addBtn.innerText='＋';

    addBtn.onclick=()=>{
      const t=prompt("タグ追加");
      if(!t)return;
      if(!e.tags) e.tags=[];
      e.tags.push(t);
      save();
    };

    tagDiv.appendChild(addBtn);
    div.appendChild(tagDiv);

    list.appendChild(div);
  });
}

/* タグフィルタ */
function renderTagFilter(){
  const area=el('tagFilterArea');
  area.innerHTML='';

  tags.forEach(t=>{
    const span=document.createElement('span');
    span.className='tag';
    span.innerText=t;

    span.onclick=()=>{
      activeTagFilter = activeTagFilter===t ? null : t;
      renderTagFilter();
      render();
    };

    area.appendChild(span);
  });
}

/* 保存 */
function save(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
  renderTagFilter();
}

/* バックアップ */
el('backupBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify({entries,tags})]);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup.json';
  a.click();
};

/* 復元 */
el('restoreBtn').onclick=()=>{
  const file=el('fileInput').files[0];
  if(!file)return;

  const reader=new FileReader();
  reader.onload=e=>{
    const d=JSON.parse(e.target.result);
    entries=d.entries||[];
    tags=d.tags||[];
    save();
  };
  reader.readAsText(file);
};

/* カレンダー開閉 */
let calOpen=true;
el('toggleCal').onclick=()=>{
  calOpen=!calOpen;
  el('calendarWrap').style.display=calOpen?'block':'none';
};

/* 初期化 */
draw();
render();
renderTags();
renderTagFilter();

</script>

</body>
</html>
