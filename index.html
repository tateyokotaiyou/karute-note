<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&display=swap" rel="stylesheet">

<style>
body{
  font-family:'M PLUS Rounded 1c',sans-serif;
  background:#f4f8f4;
  padding:20px;
  color:#333;
}

h1 span{ color:#7bbf7b; }

.header{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

button{
  background:#dff5df;
  color:#4f8f4f;
  border:none;
  border-radius:8px;
  padding:6px 12px;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  margin-bottom:16px;
}

.day{
  padding:10px;
  background:white;
  border-radius:8px;
  text-align:center;
}
.day.active{ background:#bfe8bf; }

.type-btn{
  background:white;
  border:2px solid #ccc;
  margin-right:12px;
}
.type-btn.active.symptom{
  border-color:#8bbcf5;
  color:#4a90e2;
}
.type-btn.active.memo{
  border-color:#8fd694;
  color:#4caf50;
}

.tag{
  display:inline-flex;
  align-items:center;
  background:#eef9ee;
  padding:3px 7px;
  border-radius:10px;
  margin:4px;
  font-size:12px;
}
.tag.selected{
  background:#bfe8bf;
  font-weight:600;
}
.tag button{
  font-size:10px;
  margin-left:6px;
  opacity:0.6;
}

.input-area{
  display:flex;
  gap:8px;
  margin-top:10px;
}

textarea{
  flex:1;
  height:60px;
  border-radius:8px;
  border:1px solid #ccc;
  padding:10px;
}

.entry{
  background:white;
  padding:10px;
  margin-top:10px;
  border-left:5px solid #8bbcf5;
  border-radius:8px;
  position:relative;
}
.entry.memo{
  border-left:5px solid #8fd694;
}

.delete-btn{
  position:absolute;
  right:8px;
  top:8px;
  background:none;
}
.edit-btn{
  position:absolute;
  right:40px;
  top:8px;
  background:none;
}

.meta{
  font-size:12px;
  color:#888;
  margin-bottom:4px;
}
</style>
</head>

<body>

<h1>カルテ<span>ノート</span></h1>

<div style="margin:10px 0;">
  <button onclick="exportData()">📦 バックアップ</button>
  <input type="file" id="importFile" accept=".json">
  <button onclick="importData()">📥 復元</button>
</div>

<div class="header">
  <button onclick="prevMonth()">◀</button>
  <div id="monthLabel"></div>
  <button onclick="nextMonth()">▶</button>
</div>

<div id="calendar" class="calendar"></div>

<div style="margin-bottom:12px;">
  <button class="type-btn active symptom" onclick="setType('symptom',this)">症状</button>
  <button class="type-btn memo" onclick="setType('memo',this)">薬</button>
</div>

<input id="tagInput" placeholder="タグ追加">
<button onclick="addTag()">追加</button>

<div id="tagList"></div>

<div class="input-area">
  <textarea id="text"></textarea>
  <button onclick="add()">送信</button>
</div>

<label><input type="checkbox" id="starInput"> ⭐重要</label>

<div id="list"></div>

<script>
var entries = JSON.parse(localStorage.getItem('data')||'[]');
var tags = JSON.parse(localStorage.getItem('tags')||'[]');

var selectedTags=[];
var currentType='symptom';
var current=new Date();
var selectedDate=formatDate(current);

function formatDate(d){
  return d.toISOString().slice(0,10);
}

function formatDateTime(ts){
  return new Date(ts).toLocaleString();
}

/* カレンダー */
function prevMonth(){ current.setMonth(current.getMonth()-1); drawCalendar();}
function nextMonth(){ current.setMonth(current.getMonth()+1); drawCalendar();}

function drawCalendar(){
  var cal=document.getElementById('calendar');
  cal.innerHTML='';

  var y=current.getFullYear();
  var m=current.getMonth();
  document.getElementById('monthLabel').innerText = y+"年 "+(m+1)+"月";

  var last=new Date(y,m+1,0).getDate();

  for(var i=1;i<=last;i++){
    var d=y+"-"+String(m+1).padStart(2,'0')+"-"+String(i).padStart(2,'0');
    var div=document.createElement('div');
    div.className='day'+(d===selectedDate?' active':'');
    div.innerText=i;
    div.onclick=(function(date){
      return function(){
        selectedDate=date;
        render();
        drawCalendar();
      }
    })(d);
    cal.appendChild(div);
  }
}

/* タイプ */
function setType(type,el){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(function(b){
    b.classList.remove('active');
  });
  el.classList.add('active');
}

/* タグ */
function addTag(){
  var val=document.getElementById('tagInput').value;
  if(!val)return;
  tags.push(val);
  saveAll();
  document.getElementById('tagInput').value='';
}

function renderTags(){
  var el=document.getElementById('tagList');
  el.innerHTML='';

  tags.forEach(function(t){
    var span=document.createElement('span');
    span.className='tag';
    if(selectedTags.includes(t)) span.classList.add('selected');

    var text=document.createElement('span');
    text.innerText=t;
    text.onclick=function(){
      toggleTag(t);
      renderTags();
    };

    var edit=document.createElement('button');
    edit.innerText='✏️';
    edit.onclick=function(){ renameTag(t); };

    var del=document.createElement('button');
    del.innerText='🗑';
    del.onclick=function(){ deleteTag(t); };

    span.appendChild(text);
    span.appendChild(edit);
    span.appendChild(del);

    el.appendChild(span);
  });
}

function toggleTag(tag){
  if(selectedTags.includes(tag)){
    selectedTags=selectedTags.filter(function(t){return t!==tag});
  }else{
    selectedTags.push(tag);
  }
}

/* タグ編集 */
function renameTag(tag){
  var n=prompt("名前変更",tag);
  if(!n)return;

  tags = tags.map(function(t){ return t===tag?n:t });

  entries.forEach(function(e){
    e.tags = e.tags.map(function(t){ return t===tag?n:t });
  });

  saveAll();
}

/* タグ削除 */
function deleteTag(tag){
  if(!confirm("削除する？")) return;

  tags = tags.filter(function(t){ return t!==tag });

  entries.forEach(function(e){
    e.tags = e.tags.filter(function(t){ return t!==tag });
  });

  saveAll();
}

/* 投稿 */
function add(){
  var text=document.getElementById('text').value;
  if(!text)return;

  entries.unshift({
    id:Date.now(),
    text:text,
    date:selectedDate,
    star:document.getElementById('starInput').checked,
    type:currentType,
    tags:selectedTags.slice(),
    createdAt:Date.now()
  });

  document.getElementById('text').value='';
  document.getElementById('starInput').checked=false;
  selectedTags=[];
  saveAll();
}

/* 編集 */
function editEntry(id){
  var item=entries.find(function(e){return e.id===id});
  var newText=prompt("修正", item.text);
  if(newText!==null){
    item.text=newText;
    saveAll();
  }
}

/* 削除 */
function deleteEntry(id){
  entries=entries.filter(function(e){return e.id!==id});
  saveAll();
}

/* 表示 */
function render(){
  var list=document.getElementById('list');
  list.innerHTML='';

  entries.filter(function(e){return e.date===selectedDate}).forEach(function(e){
    var div=document.createElement('div');
    div.className='entry '+e.type;

    var del=document.createElement('button');
    del.innerText='🗑';
    del.className='delete-btn';
    del.onclick=function(){ deleteEntry(e.id); };

    var edit=document.createElement('button');
    edit.innerText='✏️';
    edit.className='edit-btn';
    edit.onclick=function(){ editEntry(e.id); };

    var meta=document.createElement('div');
    meta.className='meta';
    meta.innerText=formatDateTime(e.createdAt);

    var star=document.createElement('span');
    star.innerText=e.star?'⭐':'';

    div.appendChild(del);
    div.appendChild(edit);
    div.appendChild(meta);
    div.appendChild(star);
    div.appendChild(document.createTextNode(" "+e.text));

    var tagDiv=document.createElement('div');
    e.tags.forEach(function(t){
      var tagSpan=document.createElement('span');
      tagSpan.className='tag';
      tagSpan.innerText=t;
      tagDiv.appendChild(tagSpan);
    });

    div.appendChild(tagDiv);
    list.appendChild(div);
  });
}

function saveAll(){
  localStorage.setItem('data',JSON.stringify(entries));
  localStorage.setItem('tags',JSON.stringify(tags));
  render();
  renderTags();
}

/* バックアップ */
function exportData(){
  var data={entries:entries,tags:tags};
  var blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="backup_"+new Date().toISOString().slice(0,10)+".json";
  a.click();
  localStorage.setItem("lastBackup",Date.now());
}

/* 復元 */
function importData(){
  var file=document.getElementById('importFile').files[0];
  if(!file)return;
  if(!confirm("上書きされます。OK？")) return;

  var reader=new FileReader();
  reader.onload=function(e){
    var data=JSON.parse(e.target.result);
    entries=data.entries||[];
    tags=data.tags||[];
    saveAll();
  };
  reader.readAsText(file);
}

/* バックアップ通知（5日＆初回出さない） */
function checkBackup(){
  var last = localStorage.getItem("lastBackup");

  if(!last){
    localStorage.setItem("lastBackup", Date.now());
    return;
  }

  var diff = Date.now() - parseInt(last);
  var days = diff / (1000*60*60*24);

  if(days > 5){
    setTimeout(function(){
      if(confirm("バックアップしませんか？")){
        exportData();
      }
    },1000);
  }
}

drawCalendar();
render();
renderTags();
checkBackup();
</script>

</body>
</html>
